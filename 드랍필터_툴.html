<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>드랍 필터 툴 — NUT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ── Design Tokens ── */
  --bg:#F7F8FA;
  --surface:#FFFFFF;
  --surface-hover:#F9FAFB;
  --border:#E5E7EB;
  --primary:#2563EB;
  --primary-dark:#1D4ED8;
  --primary-light:#DBEAFE;
  --text:#111827;
  --text2:#374151;
  --text3:#6B7280;
  --success:#10B981;
  --success-dark:#059669;
  --danger:#EF4444;
  --danger-dark:#DC2626;
  --warn-c:#D97706;
  --purple:#7C3AED;
  --purple-light:#EDE9FE;
  /* Spacing */
  --s1:4px;--s2:8px;--s3:12px;--s4:16px;--s5:24px;--s6:32px;
  /* Radius */
  --r-sm:8px;--r:12px;--r-lg:18px;
  /* Shadow */
  --shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(15,23,42,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.06),0 2px 4px -2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.05);
  /* ── Legacy aliases ── */
  --surf:var(--surface);--surf2:var(--surface-hover);
  --accent:var(--primary);--acc2:var(--primary-dark);
  --bd:var(--border);--bdl:#D1D5DB;
  --hov:var(--surface-hover);--sel:var(--primary-light);
  --ok:var(--success);--warn:var(--warn-c);--err:var(--danger);
  --dim:var(--text2);--muted:var(--text3);--panel:var(--surface-hover);
}
/* ── Base ── */
html{height:100%}
body{font-family:'Noto Sans KR','Inter',system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text);height:100%;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#9CA3AF}

/* ── App Shell ── */
#app{height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ══ TOOLBAR ══ */
#topbar{display:flex;align-items:center;justify-content:space-between;padding:0 var(--s5);background:var(--surface);border-bottom:1px solid var(--border);height:68px;flex-shrink:0;z-index:100}
.tb-left{display:flex;align-items:center;gap:var(--s4)}
.tb-right{display:flex;align-items:center;gap:var(--s2)}
.tb-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.4px;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0}
.tb-psel{display:flex;align-items:center;height:40px;padding:0 var(--s3);min-width:200px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);transition:border-color .15s,box-shadow .15s}
.tb-psel:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.tb-psel select{background:transparent;border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;flex:1;outline:none;font-family:inherit}
.tb-saved{font-size:11px;color:var(--success);white-space:nowrap}
.sp{flex:1}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;gap:var(--s1);height:40px;padding:0 var(--s4);border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;font-family:inherit;transition:background .15s,border-color .15s,color .15s;white-space:nowrap}
.btn:hover{background:var(--surface-hover);border-color:#9CA3AF;color:var(--text)}
.btn:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.2);border-color:var(--primary)}
.btn#savePBtn:not(:disabled){background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
.btn#savePBtn:not(:disabled):hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn.danger{border-color:#FECACA;color:var(--danger);background:#FFF5F5}
.btn.danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn-accent{background:var(--primary)!important;color:#fff!important;border-color:var(--primary)!important;font-weight:600!important}
.btn-accent:hover{background:var(--primary-dark)!important;border-color:var(--primary-dark)!important}
.btn-full{display:flex;align-items:center;justify-content:center;gap:var(--s1);width:100%;height:40px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:all .15s}
.btn-full:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-full.add{border-color:#BBF7D0;color:var(--success);background:#F0FDF4}
.btn-full.add:hover{background:var(--success);color:#fff;border-color:var(--success)}

/* ══ MAIN LAYOUT ══ */
#main{display:flex;flex:1;overflow:hidden;padding:var(--s5);gap:var(--s5);background:var(--bg)}

/* ── Panel base ── */
#panA,#panB,#panC{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}

/* ══ PANEL A — PRESET ══ */
#panA{width:280px;flex-shrink:0}
.ph{height:54px;display:flex;align-items:center;padding:0 var(--s4);border-bottom:1px solid var(--border);flex-shrink:0;gap:var(--s2)}
.ph-title{font-weight:700;font-size:15px;color:var(--text);letter-spacing:-.2px}
.ph-sub{font-size:11px;color:var(--text3);margin-left:auto;background:var(--bg);padding:3px 8px;border-radius:20px;font-weight:600}
.pa-body{flex:1;overflow-y:auto;padding:var(--s2)}

/* ── Preset list items ── */
.pi{display:flex;align-items:center;gap:var(--s2);padding:10px var(--s3);border-radius:var(--r-sm);cursor:pointer;border:1px solid transparent;margin-bottom:var(--s1);transition:all .15s}
.pi:hover{background:var(--surface-hover);border-color:var(--border)}

/* Custom (editable) preset — selected: strong highlight */
.pi.cur:not(.lock-item){background:var(--primary-light);border-color:#C7D2FE;border-left:3px solid var(--primary);padding-left:calc(var(--s3) - 2px)}

/* System preset — selected: subtle */
.pi.lock-item{cursor:default}
.pi.lock-item:hover{background:transparent;border-color:transparent}
.pi.cur.lock-item{background:#F3F4F6;border-color:#D1D5DB;border-left:3px solid #9CA3AF;padding-left:calc(var(--s3) - 2px);cursor:pointer}

.pi-radio{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;transition:all .15s}
.pi.cur:not(.lock-item) .pi-radio{border-color:var(--primary);background:var(--primary)}
.pi.cur.lock-item .pi-radio{border-color:#9CA3AF;background:#9CA3AF}
.pi-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.pi.lock-item .pi-name{color:var(--text3)}
.pi-lock{font-size:11px;color:var(--text3)}
.pi-star{cursor:pointer;color:var(--text3);font-size:14px}
.pi-star.on{color:#F59E0B}
.pi-more{color:var(--text3);font-size:18px;cursor:pointer;padding:0 2px;line-height:1;transition:color .1s}
.pi-more:hover{color:var(--text)}
.pa-divider{height:1px;background:var(--border);margin:var(--s1) 0}
.pa-sys-label{font-size:10px;color:var(--text3);padding:var(--s1) var(--s2);display:flex;align-items:center;gap:var(--s1);font-weight:700;letter-spacing:.5px;text-transform:uppercase}
#panA-foot{padding:var(--s3);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:var(--s2);flex-shrink:0}
.applied-info{font-size:11px;color:var(--text3);padding:6px var(--s3);background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)}
.applied-info strong{color:var(--primary);font-weight:600}

/* ══ PANEL B — RULE LIST ══ */
#panB{width:420px;flex-shrink:0}
#fallbackRow{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.fb-label{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap;font-weight:600}
#defBehavior{flex:1;height:32px;padding:0 var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);outline:none;cursor:pointer;transition:all .15s}
#defBehavior:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
#defBehavior:disabled{opacity:.45;cursor:not-allowed}
.radd{display:flex;gap:var(--s2);padding:var(--s2) var(--s3)}
.radd button{flex:1;height:36px;border-radius:var(--r-sm);border:1.5px dashed var(--border);background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s}
.radd button:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.radd button:disabled{opacity:.3;cursor:not-allowed}
#ruleListBody{flex:1;overflow-y:auto;padding:var(--s2)}

/* ── Rule card ── */
.rc{display:flex;align-items:center;gap:var(--s2);padding:var(--s3) var(--s4);border-radius:var(--r);border:1px solid var(--border);border-left:3px solid transparent;background:var(--surface);margin-bottom:var(--s2);cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.rc:hover{background:var(--surface-hover);border-color:#9CA3AF;border-left-color:inherit}
.rc.disabled-r{opacity:.5}
.rc-cond{border-left-color:var(--primary)}
.rc-item{border-left-color:var(--purple)}
.rc-cond.sel{background:var(--primary-light);border-color:#A5B4FC;border-left-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.rc-item.sel{background:var(--purple-light);border-color:#C4B5FD;border-left-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.08)}
.rc-type-ico{font-size:14px;flex-shrink:0;opacity:.55}
.rc .rc-drag{color:var(--text3);cursor:grab;font-size:15px;flex-shrink:0}
.rc .rc-num{font-size:11px;color:var(--text3);width:20px;text-align:center;flex-shrink:0;font-weight:700;background:var(--bg);border-radius:5px;padding:2px 0}
.tog{position:relative;width:32px;height:18px;flex-shrink:0}
.tog input{opacity:0;position:absolute;width:0;height:0}
.tog-sl{position:absolute;inset:0;background:#D1D5DB;border-radius:18px;cursor:pointer;transition:.18s}
.tog-sl::before{content:'';position:absolute;height:14px;width:14px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--primary)}
.tog input:checked+.tog-sl::before{transform:translateX(14px)}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rc-sum{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.rc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}
.b-cond{background:var(--primary-light);color:var(--primary-dark)}
.b-item{background:var(--purple-light);color:#6D28D9}
.rc-acts{display:flex;gap:2px;flex-shrink:0}
.rc-acts button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:4px 6px;border-radius:var(--r-sm);font-family:inherit;transition:all .12s;height:28px;width:28px;display:flex;align-items:center;justify-content:center}
.rc-acts button:hover{background:var(--bg);color:var(--text)}
.rc-readonly .rc-acts{display:none}
.rc-readonly .tog-sl{cursor:not-allowed;opacity:.6}
.pb-foot{padding:var(--s2) var(--s3);border-top:1px solid var(--border);font-size:11px;color:var(--text3);display:flex;gap:var(--s3);flex-shrink:0}
.leg{display:flex;align-items:center;gap:var(--s1)}
.leg-dot{width:8px;height:8px;border-radius:3px}
.rules-group-lbl{font-size:10px;font-weight:700;color:var(--text3);padding:var(--s2) var(--s1) var(--s1);letter-spacing:.6px;text-transform:uppercase}
.rules-group-sep{height:1px;background:var(--border);margin:var(--s1) 0}
.rc-move{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.rc-move button{background:none;border:1px solid var(--border);border-radius:4px;padding:2px 6px;cursor:pointer;font-size:9px;line-height:1.4;color:var(--text2);font-family:inherit;transition:all .1s}
.rc-move button:hover:not(:disabled){background:var(--primary-light);border-color:var(--primary);color:var(--primary)}
.rc-move button:disabled{opacity:.2;cursor:default}

/* ══ PANEL C — EDITOR ══ */
#panC{flex:1}

/* ── Panel C Tabs ── */
#panCTabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 var(--s4)}
.pc-tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:16px var(--s4);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text3);transition:all .15s;white-space:nowrap}
.pc-tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.pc-tab:hover:not(.on){color:var(--text)}
#panCEditWrap{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ── Edit Header ── */
.edit-hdr{display:flex;align-items:center;gap:var(--s3);padding:var(--s3) var(--s4);background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;min-height:56px}
.edit-hdr input[type=text]{height:40px;border:1px solid var(--border);border-radius:var(--r-sm);padding:0 var(--s3);font-size:14px;font-weight:600;font-family:inherit;background:var(--bg);color:var(--text);width:210px;outline:none;transition:all .15s}
.edit-hdr input[type=text]:focus{border-color:var(--primary);background:var(--surface);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.rule-type-sw{display:flex;border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;background:var(--bg)}
.rts{padding:8px var(--s4);font-size:12px;font-weight:600;cursor:pointer;color:var(--text3);transition:all .15s;user-select:none}
.rts.on{background:var(--primary);color:#fff}
.eh-nav button{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:6px var(--s2);cursor:pointer;font-size:13px;font-family:inherit;color:var(--text2);transition:all .1s;height:36px}
.eh-nav button:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.pri-sel{display:flex;align-items:center;gap:var(--s1);font-size:12px;color:var(--text2)}
.pri-sel select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);padding:5px var(--s2);font-size:12px;font-family:inherit;outline:none}
.btn-del{background:#FEF2F2;border:1px solid #FECACA;color:var(--danger);border-radius:var(--r-sm);padding:6px var(--s3);cursor:pointer;font-size:12px;font-weight:500;font-family:inherit;transition:all .15s;height:36px}
.btn-del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-save-rule{background:var(--success)!important;color:#fff!important;border-color:var(--success)!important;font-weight:600!important}
.readonly-bar{background:#FFFBEB;border:1px solid #FDE68A;border-radius:var(--r-sm);padding:6px var(--s3);font-size:12px;color:#92400E;margin:var(--s2) var(--s3) 0}

/* ── Edit body split ── */
#editBody{display:flex;flex:1;overflow:hidden}
#condPane{width:45%;min-width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
#rightPane{flex:1;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;overflow-y:auto}

/* ── Edit placeholder ── */
.edit-placeholder{display:flex;align-items:center;gap:var(--s3);color:var(--text3)}
.edit-placeholder .ep-ico{font-size:20px;opacity:.5}
.edit-placeholder .ep-txt{font-size:13px;font-weight:500}

/* ── Condition Pane ── */
#catTabs{display:none}
.cat-dropsel{width:100%;height:40px;padding:0 var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:all .15s}
.cat-dropsel:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.cond-slot-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:var(--s2);background:var(--surface);box-shadow:var(--shadow)}
.cond-slot-row{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);background:var(--bg);border-bottom:1px solid var(--border)}
.cond-slot-body{padding:var(--s3)}
.slot-empty-row{border:1.5px dashed var(--border);border-radius:var(--r);margin-bottom:var(--s2);background:transparent}
.slot-empty-row .cond-slot-row{border-bottom:none;background:transparent}
.slot-ph{padding:var(--s5);text-align:center;color:var(--text3);font-size:13px}
.cond-form{flex:1;overflow-y:auto;padding:var(--s3);background:var(--bg)}

/* ── Condition Blocks (Accordion) ── */
.cond-block{margin-bottom:var(--s2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:var(--shadow)}
.cond-hdr{display:flex;align-items:center;gap:var(--s2);padding:11px var(--s3);cursor:pointer;background:var(--surface);transition:background .15s;user-select:none}
.cond-hdr:hover{background:var(--surface-hover)}
.cond-hdr.active{background:var(--primary-light)}
.cond-check{width:16px;height:16px;border:2px solid var(--border);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cond-check.on{background:var(--primary);border-color:var(--primary)}
.cond-check.on::after{content:'✓';font-size:10px;color:#fff}
.cond-label{font-size:13px;font-weight:700;color:var(--text)}
.cond-preview{font-size:11px;color:var(--primary);margin-left:auto;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.cond-arrow{font-size:10px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.cond-hdr.open .cond-arrow{transform:rotate(90deg)}
.cond-body{display:none;padding:var(--s3);border-top:1px solid var(--border);background:#FAFBFF}
.cond-body.open{display:block}

/* ── Chips ── */
.chips{display:flex;flex-wrap:wrap;gap:var(--s1);margin-top:var(--s1)}
.chip{padding:5px var(--s3);border-radius:20px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;font-family:inherit;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.chip.on{background:var(--primary);border-color:var(--primary);color:#fff}
.sub-indent{margin-left:var(--s2);padding-left:var(--s3);border-left:2px solid #C7D2FE;margin-top:var(--s2)}
.sub-label{font-size:11px;color:var(--text2);margin-bottom:var(--s1);font-weight:600}
.tier-range{display:flex;align-items:center;gap:var(--s2);margin-top:var(--s1)}
.tier-range input{width:72px;height:36px;padding:0 var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;outline:none;transition:all .15s}
.tier-range input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.bool-row{display:flex;gap:var(--s4);margin-top:var(--s1)}
.ck{display:flex;align-items:center;gap:var(--s1);cursor:pointer;font-size:13px;font-weight:500;user-select:none}
.ck input{accent-color:var(--primary);width:15px;height:15px}
.opt-search{width:100%;height:36px;padding:0 var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;outline:none;margin-bottom:var(--s2);transition:all .15s}
.opt-search:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.opt-list{max-height:180px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r-sm)}
.opt-row{display:flex;align-items:center;gap:var(--s1);padding:7px var(--s3);border-bottom:1px solid var(--border);cursor:pointer;font-size:12px;font-weight:500;transition:background .1s}
.opt-row:last-child{border-bottom:none}
.opt-row:hover{background:var(--surface-hover)}
.opt-row.on{background:var(--primary-light);color:var(--primary)}
.il{font-size:11px;color:var(--text2);display:block;margin-bottom:var(--s1);font-weight:600}
.styled-input{width:100%;height:36px;padding:0 var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:all .15s}
.styled-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── Right pane: Summary + Action ── */
.rp-section{padding:var(--s4);border-bottom:1px solid var(--border)}
.rp-section:last-child{border-bottom:none}
.sec-title{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:var(--s3)}
.cond-note{font-size:11px;color:var(--text3);margin-bottom:var(--s2);line-height:1.5}
.sum-empty{font-size:12px;color:var(--text3);font-style:italic}
.sum-tag{display:inline-flex;align-items:center;gap:var(--s1);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px;color:var(--text)}
.sum-tag .st-key{font-weight:700;color:var(--primary)}
.sum-tag .st-val{color:var(--text2)}
.sum-op{display:inline-block;font-size:11px;color:var(--text3);margin:2px 3px;vertical-align:middle}
.sum-operator-row{display:flex;align-items:center;gap:var(--s2);margin-bottom:var(--s3);font-size:12px;color:var(--text2)}
.sum-operator-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);padding:5px var(--s2);font-size:12px;font-family:inherit;outline:none}

/* ── Action Section ── */
.act-row{display:flex;align-items:center;gap:var(--s3);margin-bottom:var(--s3)}
.act-label{font-size:12px;font-weight:600;color:var(--text2);width:86px;flex-shrink:0}
.act-val{flex:1;display:flex;align-items:center;gap:var(--s2)}
.act-status{font-size:12px;font-weight:600}
.act-status.on{color:var(--success)}
.act-status.off{color:var(--text3)}
.act-divider{height:1px;background:var(--border);margin:var(--s2) 0}
.tog2{position:relative;width:36px;height:20px;flex-shrink:0}
.tog2 input{opacity:0;position:absolute;width:0;height:0}
.tog2-sl{position:absolute;inset:0;background:#D1D5DB;border-radius:20px;cursor:pointer;transition:.18s}
.tog2-sl::before{content:'';position:absolute;height:16px;width:16px;left:2px;top:2px;background:#fff;border-radius:50%;transition:.18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog2 input:checked+.tog2-sl{background:var(--primary)}
.tog2 input:checked+.tog2-sl::before{transform:translateX(16px)}
.color-wrap{display:flex;flex-wrap:wrap;gap:var(--s1)}
.csw{width:22px;height:22px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.csw:hover{transform:scale(1.2);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.csw.on{border-color:#111827;box-shadow:0 0 0 2px #fff,0 0 0 4px #111827}
.csw.none-sw{background:repeating-linear-gradient(45deg,#E5E7EB 0,#E5E7EB 2px,#fff 2px,#fff 6px);border-color:var(--border)}
.int-slider{display:flex;align-items:center;gap:var(--s2);flex:1}
.int-slider input{flex:1;accent-color:var(--primary)}
.int-val{font-size:13px;font-weight:700;color:var(--primary);width:16px;text-align:center}
.def-sel{width:100%;height:36px;padding:0 var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-weight:500;font-family:inherit;outline:none;background:var(--surface);color:var(--text);transition:all .15s;cursor:pointer}
.def-sel:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── Item Browser ── */
.ib-cnt-bar{padding:var(--s2) var(--s4);background:var(--primary-light);color:var(--primary);border-bottom:1px solid #C7D2FE;font-size:12px;font-weight:600;flex-shrink:0}
.ib-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;padding:0 var(--s2)}
.ib-tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px var(--s3);font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;color:var(--text3);transition:all .15s}
.ib-tab.on{color:var(--primary);border-bottom-color:var(--primary);font-weight:700}
.ib-tab:hover:not(.on){color:var(--text)}
.ib-search-row{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.ib-search-inp{flex:1;border:none;outline:none;font-size:13px;font-family:inherit;color:var(--text);background:transparent}
.ib-list{flex:1;overflow-y:auto;background:var(--bg)}
.ib-all{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s4);background:var(--primary-light);border-bottom:2px solid var(--primary);cursor:default}
.ib-grp-hdr{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s4);background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;font-weight:600;font-size:12px;transition:background .1s}
.ib-grp-hdr:hover{background:var(--surface-hover)}
.ib-row{display:flex;align-items:center;gap:var(--s2);padding:7px var(--s4) 7px 32px;border-bottom:1px solid var(--border);font-size:13px;background:var(--surface);transition:background .1s}
.ib-row:hover{background:var(--surface-hover)}
.ib-row.on{background:var(--primary-light)}

/* ── Item area ── */
.item-area textarea{width:100%;min-height:70px;padding:var(--s2) var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:monospace;resize:vertical;outline:none;background:var(--surface);transition:all .15s}
.item-area textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.item-cnt{font-size:11px;color:var(--text3);margin-top:3px}

/* ── Save Rule Row ── */
#saveRuleRow{border-top:1px solid var(--border);flex-shrink:0;padding:var(--s3) var(--s4)}
#saveRuleRow button{width:100%;height:40px;border-radius:var(--r-sm);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--success);color:#fff;border:none;transition:all .18s;letter-spacing:.01em}
#saveRuleRow button:hover{background:var(--success-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.25)}

/* ── Empty states ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:var(--s3)}
.empty-ico{font-size:36px;opacity:.5}
.empty-txt{font-size:13px;font-weight:500}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:var(--s5);min-width:340px;box-shadow:var(--shadow-lg),0 20px 60px rgba(0,0,0,.12);border:1px solid var(--border)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:var(--s4);color:var(--text)}
.modal input{width:100%;height:40px;padding:0 var(--s3);border:1px solid var(--border);border-radius:var(--r-sm);font-size:13px;font-family:inherit;margin-bottom:var(--s4);outline:none;transition:all .15s}
.modal input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.modal-btns{display:flex;gap:var(--s2);justify-content:flex-end}

/* ── Context Menu ── */
#ctxMenu{position:fixed;z-index:2000;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:var(--s1);box-shadow:var(--shadow-md);min-width:150px;display:none}
#ctxMenu button{display:block;width:100%;padding:var(--s2) var(--s3);background:none;border:none;text-align:left;font-size:13px;font-family:inherit;cursor:pointer;border-radius:var(--r-sm);color:var(--text);font-weight:500;transition:background .1s}
#ctxMenu button:hover{background:var(--surface-hover)}
#ctxMenu button.danger{color:var(--danger)}
#ctxMenu button.danger:hover{background:#FEF2F2}

/* ── Toast ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:10px var(--s4);border-radius:var(--r-sm);font-size:13px;font-weight:500;z-index:3000;pointer-events:none;animation:fadeup .2s;box-shadow:var(--shadow-md)}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Script preview ── */
#scriptPreview{flex:1;overflow-y:auto;background:#0F172A;display:none}
#spContent{display:block;padding:20px 24px;font-family:'Consolas','Monaco','Courier New',monospace;font-size:12.5px;line-height:1.85;white-space:pre;color:#CBD5E1;min-height:100%;margin:0;box-sizing:border-box}
.sp-cmt{color:#475569}
.sp-key{color:#7DD3FC}
.sp-str{color:#86EFAC}
.sp-num{color:#FCA5A5}
.sp-bool{color:#C4B5FD}

/* ══ PHASE 2 — Interaction & Polish ══ */

/* ── rc-acts / rc-move: hover 시 노출 ── */
.rc-acts{opacity:0;transition:opacity .15s}
.rc:hover .rc-acts,.rc.sel .rc-acts{opacity:1}
.rc-move{opacity:0;transition:opacity .15s}
.rc:hover .rc-move{opacity:1}
/* 삭제 버튼 위험 색 */
.rc-acts button:last-child:hover{background:#FEF2F2!important;color:var(--danger)!important}

/* ── 선택된 커스텀 프리셋 강조 ── */
.pi.cur:not(.lock-item) .pi-name{font-weight:700;color:var(--primary)}

/* ── pi-more / pi-star: hover 시 노출 ── */
.pi-more{opacity:0;transition:opacity .12s}
.pi:hover .pi-more,.pi.cur .pi-more{opacity:1}
.pi-star:not(.on){opacity:0;transition:opacity .12s}
.pi:hover .pi-star,.pi-star.on{opacity:1}

/* ── 규칙 번호 배지 ── */
.rc .rc-num{
  font-size:10px;font-weight:800;color:var(--primary);
  background:var(--primary-light);border-radius:6px;
  width:22px;padding:3px 0;text-align:center;letter-spacing:0
}
.rc-item .rc-num{color:var(--purple);background:var(--purple-light)}

/* ── 그룹 레이블 중앙 섹션 헤더 ── */
.rules-group-lbl{
  display:flex;align-items:center;gap:var(--s2);
  font-size:10px;font-weight:800;color:var(--text3);
  padding:var(--s3) var(--s2) var(--s2);
  letter-spacing:.7px;text-transform:uppercase
}
.rules-group-lbl::before,.rules-group-lbl::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── 편집 헤더 이름 입력 ── */
.edit-hdr input[type=text]{width:220px;font-weight:700}

/* ── 빈 상태 텍스트 줄바꿈 ── */
.empty-txt{white-space:pre-line;text-align:center;line-height:1.65}

/* ── 조건 슬롯 헤더 배경 ── */
.cond-hdr.open{background:var(--primary-light)}
.cond-hdr.open .cond-label{color:var(--primary)}

/* ── 선택된 룰 카드 이름 강조 ── */
.rc.sel .rc-name{color:var(--primary)}
.rc-item.sel .rc-name{color:var(--purple)}

/* ── 비활성화 규칙: 텍스트 스타일 ── */
.rc.disabled-r .rc-name{text-decoration:line-through;opacity:.7}
.rc.disabled-r .tog-sl{background:#D1D5DB!important}

/* ══ PHASE 3 — Editor Polish ══ */

/* ── condForm: listWrap이 자체 padding 보유 ── */
.cond-form{padding:0}

/* ── 슬롯 카드 ── */
.cond-slot-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface);box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(15,23,42,.04)}
.cond-slot-row{display:flex;align-items:center;gap:var(--s2);padding:var(--s2) var(--s3);background:var(--bg);border-bottom:1px solid var(--border)}
.cond-slot-body{padding:var(--s3)}
.slot-empty-row{border:1.5px dashed #CBD5E1;border-radius:var(--r);background:transparent}
.slot-empty-row .cond-slot-row{border-bottom:none;background:transparent}
.slot-ph{padding:var(--s6) var(--s5);text-align:center;color:var(--text3);font-size:13px;font-weight:500;line-height:1.6}

/* ── 조건 블록 (accordion) ── */
.cond-block{margin-bottom:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface)}
.cond-block:last-child{margin-bottom:0}
.cond-hdr{display:flex;align-items:center;gap:var(--s3);padding:var(--s3);cursor:pointer;background:var(--surface);transition:background .12s;user-select:none;min-height:44px}
.cond-hdr:hover{background:var(--surface-hover)}
.cond-hdr.active,.cond-hdr.open{background:#EFF6FF;border-left:3px solid var(--primary);padding-left:calc(var(--s3) - 2px)}
.cond-hdr.active .cond-label,.cond-hdr.open .cond-label{color:var(--primary);font-weight:700}
.cond-check{width:18px;height:18px;border:2px solid #CBD5E1;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:var(--surface)}
.cond-check.on{background:var(--primary);border-color:var(--primary)}
.cond-check.on::after{content:'✓';font-size:11px;color:#fff;font-weight:700}
.cond-label{font-size:13px;font-weight:600;color:var(--text);flex:1}
.cond-preview{font-size:11px;color:var(--primary);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;background:var(--primary-light);padding:2px 8px;border-radius:20px;flex-shrink:0}
.cond-arrow{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.cond-hdr.open .cond-arrow{transform:rotate(90deg)}
.cond-body{display:none;padding:var(--s4) var(--s3);border-top:1px solid var(--border);background:var(--surface)}
.cond-body.open{display:block}

/* ── 칩 ── */
.chips{display:flex;flex-wrap:wrap;gap:var(--s1);margin-top:var(--s2)}
.chip{padding:5px var(--s3);border-radius:20px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:600;font-family:inherit;transition:all .12s;user-select:none;line-height:1.2}
.chip:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.chip.on{background:var(--primary);border-color:var(--primary);color:#fff}

/* ── 섹션 타이틀 (좌측 accent 바) ── */
.sec-title{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:var(--s3);display:flex;align-items:center;gap:var(--s2)}
.sec-title::before{content:'';width:3px;height:12px;background:var(--primary);border-radius:2px;flex-shrink:0}

/* ── 액션 섹션 ── */
.rp-section{padding:var(--s4) var(--s5)}
.act-label{font-size:12px;font-weight:700;color:var(--text2);width:90px;flex-shrink:0}
.act-row{display:flex;align-items:center;gap:var(--s4);margin-bottom:var(--s3)}
.act-row:last-child{margin-bottom:0}
.act-divider{height:1px;background:var(--border);margin:var(--s3) 0}

/* ── 색상 칩 ── */
.csw{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .12s;flex-shrink:0}
.csw:hover{transform:scale(1.22);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.csw.on{border-color:var(--text);box-shadow:0 0 0 2px #fff,0 0 0 4px var(--text)}
.csw.none-sw{background:repeating-linear-gradient(45deg,#E5E7EB 0,#E5E7EB 2px,#fff 2px,#fff 6px);border-color:var(--border)}

/* ── 슬라이더 ── */
.int-slider input{flex:1;accent-color:var(--primary);cursor:pointer}
.int-val{font-size:13px;font-weight:800;color:var(--primary);min-width:20px;text-align:center}

/* ── 요약 태그 ── */
.sum-tag{display:inline-flex;align-items:center;gap:4px;background:var(--primary-light);border:1px solid #C7D2FE;border-radius:20px;padding:4px 12px;font-size:12px;margin:2px;color:var(--text)}
.sum-tag .st-key{font-weight:800;color:var(--primary-dark)}
.sum-tag .st-val{color:var(--text2);font-weight:500}
.sum-op{display:inline-block;font-size:10px;font-weight:700;color:var(--text3);margin:2px 4px;vertical-align:middle;text-transform:uppercase;letter-spacing:.5px}

/* ── 아이템 브라우저 카운트 바 ── */
.ib-cnt-bar{padding:var(--s2) var(--s4);background:var(--primary-light);color:var(--primary);border-bottom:1px solid #C7D2FE;font-size:12px;font-weight:700;flex-shrink:0}

/* ── 저장 행 ── */
#saveRuleRow{padding:var(--s3) var(--s4)}
#saveRuleRow button{letter-spacing:.02em;font-weight:700;box-shadow:0 2px 8px rgba(16,185,129,.15)}
#saveRuleRow button:hover{box-shadow:0 4px 16px rgba(16,185,129,.3)}

/* ── 조건 노트 ── */
.cond-note{font-size:11px;color:var(--text3);margin-bottom:var(--s3);line-height:1.6;padding:var(--s2) var(--s3);background:var(--bg);border-radius:var(--r-sm);border:1px solid var(--border)}

/* ══ PHASE 4 — Animations & Cleanup ══ */

/* ── 버튼 클릭 피드백 ── */
.btn:active{transform:translateY(1px)}
.btn-full:active{transform:translateY(1px)}
.chip:active{transform:scale(.96)}
.rc-acts button:active{transform:scale(.92)}

/* ── 카드 hover 리프트 ── */
.rc{transition:all .15s,transform .1s}
.rc:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(15,23,42,.06)}
.rc.sel{transform:none}

/* ── 프리셋 아이템 hover 리프트 ── */
.pi{transition:all .15s,transform .1s}
.pi:hover:not(.lock-item){transform:translateX(2px)}
.pi.cur{transform:none}

/* ── 모달 등장 애니메이션 ── */
.modal-bg.open .modal{animation:modalIn .18s cubic-bezier(.34,1.2,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* ── 툴바 저장 버튼 pulse (더티 상태) ── */
.btn#savePBtn:not(:disabled){animation:none}

/* ── 포커스 링 통일 ── */
*:focus-visible{outline:2px solid var(--primary);outline-offset:2px;border-radius:var(--r-sm)}
.tog-sl:focus-visible,.tog2-sl:focus-visible{outline:none}
input:focus-visible,select:focus-visible,textarea:focus-visible{outline:none}

/* ── 스크롤 영역 부드럽게 ── */
.pa-body,#ruleListBody,#condForm,#rightPane,.ib-list{scroll-behavior:smooth}

/* ── 반투명 로딩 레이어 방지 ── */
*{-webkit-tap-highlight-color:transparent}

/* ── 조건 없음 안내 ── */
#summaryTags .sum-empty{font-size:12px;color:var(--text3);font-style:italic;padding:2px 0}

/* ── 패널 A: 커스텀 프리셋 섹션 레이블 ── */
.pa-cust-label{font-size:10px;color:var(--text3);padding:var(--s2) var(--s2) var(--s1);font-weight:700;letter-spacing:.5px;text-transform:uppercase}

/* ── 조건 AND/OR 토글 ── */
.sum-operator-row{display:flex;align-items:center;gap:var(--s2);margin-bottom:var(--s3);font-size:12px;color:var(--text2)}
.sum-operator-row select{height:32px;padding:0 var(--s2);background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--r-sm);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s,box-shadow .15s;cursor:pointer}
.sum-operator-row select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}

/* ── 아이템 브라우저 행 체크박스 ── */
.ib-row input[type=checkbox],.ib-all input[type=checkbox]{accent-color:var(--primary);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.ib-grp-hdr input[type=checkbox]{accent-color:var(--text3);width:14px;height:14px}

/* ── 편집 헤더: 읽기전용 레이아웃 ── */
.edit-hdr .edit-placeholder{padding:0;gap:var(--s3)}
.edit-hdr .ep-ico{font-size:22px}
.edit-hdr .ep-txt{font-size:13px;font-weight:500;color:var(--text3)}
</style>
</head>
<body>
<div id="app">

<!-- topbar -->
<div id="topbar">
  <div class="tb-left">
    <span class="tb-title">드랍 필터</span>
    <div class="tb-sep"></div>
    <div class="tb-psel">
      <select id="topSel" onchange="selectPreset(this.value)"></select>
    </div>
  </div>
  <div class="tb-right">
    <button class="btn" id="savePBtn" onclick="savePreset()" disabled>💾 저장</button>
    <button class="btn" onclick="openSaveAs()">다른이름</button>
    <button class="btn" onclick="exportFilter()">Export</button>
    <button class="btn" onclick="importClick()">Import</button>
    <div class="tb-sep"></div>
    <button class="btn danger" onclick="resetAll()">초기화</button>
  </div>
</div>

<div id="main">
  <!-- panel A: preset list -->
  <div id="panA">
    <div class="ph"><span class="ph-title">프리셋</span><span class="ph-sub" id="presetCnt">0/20</span></div>
    <div class="pa-body" id="presetBody"></div>
    <div id="panA-foot">
      <div class="applied-info">적용 중: <strong id="appliedName">—</strong></div>
      <button class="btn-full" onclick="applyPreset()">✅ 이 프리셋 적용</button>
      <button class="btn-full add" onclick="openAddPreset()">+ 새 프리셋</button>
    </div>
  </div>

  <!-- panel B: rule list -->
  <div id="panB">
    <div class="ph"><span class="ph-title">규칙 목록</span><span class="ph-sub" id="ruleCnt">0/50</span></div>
    <div id="fallbackRow">
      <span class="fb-label">지정되지 않은 아이템:</span>
      <select id="defBehavior" onchange="updateDefaultBehavior(this.value)">
        <option value="Default">시스템 기본값 적용</option>
        <option value="HideAll">모든 연출 미표시</option>
      </select>
    </div>
    <div class="radd">
      <button id="addCondBtn" onclick="addCondRule()">+ 조건 규칙</button>
      <button id="addItemBtn" onclick="addItemRule()">+ 개별 아이템</button>
    </div>
    <div id="ruleListBody"></div>
    <div class="pb-foot">
      <div class="leg"><div class="leg-dot b-cond" style="border-radius:2px"></div> 조건</div>
      <div class="leg"><div class="leg-dot b-item" style="border-radius:2px"></div> 아이템</div>
    </div>
  </div>

  <!-- panel C: edit panel -->
  <div id="panC">
    <!-- tab bar -->
    <div id="panCTabs">
      <button class="pc-tab on" data-tab="edit" onclick="switchPanCTab('edit')">편집</button>
      <button class="pc-tab" data-tab="preview" onclick="switchPanCTab('preview')">스크립트 미리보기</button>
    </div>

    <!-- edit wrap -->
    <div id="panCEditWrap">
    <div class="edit-hdr" id="editHdr">
      <div class="edit-placeholder">
        <span class="ep-ico">👈</span>
        <span class="ep-txt">규칙을 선택하거나 새로 추가하세요</span>
      </div>
    </div>

    <div id="editBody" style="display:none">
      <!-- left: condition editor -->
      <div id="condPane">
        <div class="cat-tabs" id="catTabs"></div>
        <div class="cond-form" id="condForm"></div>
      </div>
      <!-- left: item browser (아이템 규칙 선택 시 condPane 대체) -->
      <div id="itemBody" style="display:none;flex-direction:column;overflow:hidden;width:55%;min-width:320px;flex-shrink:0;border-right:1px solid var(--bd);background:var(--surf)">
        <div id="itemBrowserBody" style="flex:1;overflow:hidden;display:flex;flex-direction:column"></div>
      </div>
      <!-- right: summary + action -->
      <div id="rightPane">
        <!-- condition summary -->
        <div class="rp-section" id="summarySection">
          <div class="sec-title">조건 요약</div>
          <div class="cond-note">서로 다른 조건 유형은 모두 AND로 적용됩니다</div>
          <div id="summaryTags"><span class="sum-empty">조건 없음 — 전체 아이템에 적용</span></div>
        </div>
        <!-- action -->
        <div class="rp-section" id="actionSection">
          <div class="sec-title">액션 설정</div>
          <!-- label -->
          <div class="act-row">
            <span class="act-label">라벨 표시</span>
            <div class="act-val">
              <label class="tog2"><input type="checkbox" id="actLabelEn" onchange="updateAction('labelEnabled',this.checked)"><div class="tog2-sl"></div></label>
              <span id="actLabelEnTxt" class="act-status on">ON</span>
            </div>
          </div>
          <div class="act-row" id="labelColorRow">
            <span class="act-label">글자 색</span>
            <div class="act-val"><div class="color-wrap" id="fontColorPicker"></div></div>
          </div>
          <div class="act-row">
            <span class="act-label">배경 색</span>
            <div class="act-val"><div class="color-wrap" id="bgColorPicker"></div></div>
          </div>
          <!-- fx -->
          <div class="act-divider"></div>
          <div class="act-row">
            <span class="act-label">빛기둥 FX</span>
            <div class="act-val">
              <label class="tog2"><input type="checkbox" id="actFxEn" onchange="updateAction('fxEnabled',this.checked)"><div class="tog2-sl"></div></label>
              <span id="actFxEnTxt" class="act-status off">OFF</span>
            </div>
          </div>
          <div class="act-row" id="fxIntRow">
            <span class="act-label">강도 (0~5)</span>
            <div class="act-val">
              <div class="int-slider">
                <input type="range" min="0" max="5" step="1" id="fxInt" oninput="updateAction('fxIntensity',+this.value); document.getElementById('fxIntVal').textContent=this.value">
                <span class="int-val" id="fxIntVal">0</span>
              </div>
            </div>
          </div>
          <!-- sound -->
          <div class="act-divider"></div>
          <div class="act-row">
            <span class="act-label">사운드</span>
            <div class="act-val" style="gap:14px">
              <label class="ck">
                <label class="tog2"><input type="checkbox" id="actSndLand" onchange="updateAction('soundLand',this.checked)"><div class="tog2-sl"></div></label>
                착지
              </label>
              <label class="ck">
                <label class="tog2"><input type="checkbox" id="actSndAir" onchange="updateAction('soundAir',this.checked)"><div class="tog2-sl"></div></label>
                공중
              </label>
            </div>
          </div>
        </div>
        <!-- save rule footer -->
        <div id="saveRuleRow" style="display:none">
          <button id="saveRuleFootBtn">규칙 저장</button>
        </div>
      </div>
    </div>
    </div><!-- /#panCEditWrap -->

    <!-- script preview -->
    <div id="scriptPreview">
      <pre id="spContent"></pre>
    </div>

  </div>
</div><!-- /#main -->
</div><!-- /#app -->

<!-- modals -->
<div class="modal-bg" id="modalAdd"><div class="modal">
  <h3>새 프리셋 추가</h3>
  <input id="addName" type="text" placeholder="프리셋 이름" maxlength="30">
  <div class="modal-btns">
    <button class="btn" onclick="closeModal('modalAdd')">취소</button>
    <button class="btn btn-accent" onclick="confirmAdd()">추가</button>
  </div>
</div></div>
<div class="modal-bg" id="modalSaveAs"><div class="modal">
  <h3>다른 이름으로 저장</h3>
  <input id="saveAsName" type="text" maxlength="30">
  <div class="modal-btns">
    <button class="btn" onclick="closeModal('modalSaveAs')">취소</button>
    <button class="btn btn-accent" onclick="confirmSaveAs()">저장</button>
  </div>
</div></div>

<div id="ctxMenu"></div>
<input type="file" id="importInput" accept=".nutfilter" style="display:none" onchange="onImport(event)">

function curPreset() { return S.presets.find(p => p.id === S.curId) || null; }
function selRule() {
  const p = curPreset(); if (!p) return null;
  const list = S.selRuleType === 'cond' ? p.condRules : p.itemRules;
  return list?.find(r => r.id === S.selRuleId) || null;
}
function isReadOnly() { const p = curPreset(); return p ? p.isEditable === false : false; }

function mkCond() {
  return {
    ItemName:       { enabled:false, text:'' },
    ItemType:       { enabled:false, values:[] },
    ItemSubType:    { enabled:false, values:[] },
    EquipAttribute: { enabled:false, values:[] },
    ItemGrade:      { enabled:false, values:[] },
    ItemQuality:    { enabled:false, values:[] },
    ItemTier:       { enabled:false, min:0, max:10 },
    IsRelicItem:    { enabled:false, boolVal:true },
    RelicSetGroup:  { enabled:false, values:[] },
    IsNamedItem:    { enabled:false, boolVal:true },
    NamedItemType:  { enabled:false, text:'' },
    ItemOptionName: { enabled:false, values:[] },
  };
}
function mkAction() { return { labelEnabled:true, labelFontColor:null, labelBgColor:null, fxEnabled:true, fxIntensity:0, soundLand:true, soundAir:true }; }
function mkCondRule(priority, name='새 조건 규칙') {
  return { id:uid(), type:'cond', name, priority, enabled:true, operator:'AND', cond:mkCond(), action:mkAction(), uiSlots:[] };
}
function mkItemRule(priority, name='새 아이템 규칙') {
  return { id:uid(), type:'item', name, priority, enabled:true, itemKeys:[], action:mkAction() };
}

// ══ INIT ══
function init() {
  const sysDefault = { id:uid(), name:'[기본값]', isSystem:true, isEditable:false, isFavorite:false,
    defaultBehavior:'Default', condRules:[], itemRules:[] };
  S.presets = [sysDefault];
  S.curId = sysDefault.id;
  S.appliedId = sysDefault.id;
  render();
}

// ══ RENDER ══
function render() {
  renderPresets();
  renderRules();
  renderEdit();
  updateSaveBtn();
  if (_panCTab === 'preview') renderScriptPreview();
}

function renderPresets() {
  const body = document.getElementById('presetBody');
  body.innerHTML = '';
  const sys = S.presets.filter(p => p.isSystem);
  const cust = S.presets.filter(p => !p.isSystem);

  if (sys.length) {
    const lbl = el('div','pa-sys-label','🔒 시스템 기본'); body.appendChild(lbl);
    sys.forEach(p => body.appendChild(buildPI(p)));
    body.appendChild(el('div','pa-divider'));
  }
  if (!cust.length) {
    const e = el('div','',''); e.style.cssText='font-size:12px;color:var(--muted);text-align:center;padding:12px 6px'; e.textContent='커스텀 프리셋 없음'; body.appendChild(e);
  } else {
    cust.forEach(p => body.appendChild(buildPI(p)));
  }

  const custCount = cust.length;
  document.getElementById('presetCnt').textContent = custCount + '/20';
  document.getElementById('appliedName').textContent = S.presets.find(p=>p.id===S.appliedId)?.name || '—';

  // top select
  const sel = document.getElementById('topSel');
  sel.innerHTML = '';
  S.presets.forEach(p => {
    const o = document.createElement('option');
    o.value = p.id; o.textContent = (p.isSystem ? '[시스템] ' : '') + p.name;
    if (p.id === S.curId) o.selected = true;
    sel.appendChild(o);
  });
}

function buildPI(p) {
  const div = el('div','pi' + (p.id===S.curId?' cur':'') + (p.isEditable===false?' lock-item':''));
  div.dataset.id = p.id;
  div.appendChild(el('div','pi-radio'));
  const nm = el('div','pi-name', p.name); div.appendChild(nm);
  if (p.isSystem) {
    div.appendChild(el('span','pi-lock','🔒'));
  } else {
    const star = el('span','pi-star'+(p.isFavorite?' on':''), p.isFavorite?'★':'☆');
    star.onclick = e => { e.stopPropagation(); toggleFav(p.id); }; div.appendChild(star);
    const more = el('span','pi-more','⋮');
    more.onclick = e => { e.stopPropagation(); showCtx(p.id, more); }; div.appendChild(more);
  }
  div.onclick = () => selectPreset(p.id);
  return div;
}

function renderRules() {
  const p = curPreset();
  const body = document.getElementById('ruleListBody');
  body.innerHTML = '';
  const ro = p?.isEditable === false;

  document.getElementById('addCondBtn').disabled = ro || !p;
  document.getElementById('addItemBtn').disabled = ro || !p;

  if (!p) { body.appendChild(emptyState('📋','프리셋을 선택하세요')); updateFallbackRow(); return; }
  if (p.isSystem) {
    document.getElementById('addCondBtn').style.display = 'none';
    document.getElementById('addItemBtn').style.display = 'none';
    body.appendChild(emptyState('⚙️','기본 프리셋은 편집할 수 없습니다\n커스텀 프리셋을 추가하여 사용하세요'));
    updateFallbackRow(); return;
  }
  document.getElementById('addCondBtn').style.display = '';
  document.getElementById('addItemBtn').style.display = '';

  const itemList = (p.itemRules||[]).slice().sort((a,b)=>a.priority-b.priority).map(r=>({...r,_type:'item'}));
  const condList = (p.condRules||[]).slice().sort((a,b)=>a.priority-b.priority).map(r=>({...r,_type:'cond'}));

  if (!itemList.length && !condList.length) { body.appendChild(emptyState('📋','규칙이 없습니다')); updateFallbackRow(); return; }

  if (itemList.length > 0) {
    body.appendChild(el('div','rules-group-lbl','⬛ 개별 아이템 (최우선 적용)'));
    itemList.forEach((r,i) => body.appendChild(buildRC(r, ro, i===0, i===itemList.length-1)));
  }
  if (condList.length > 0) {
    if (itemList.length > 0) body.appendChild(el('div','rules-group-sep'));
    body.appendChild(el('div','rules-group-lbl','📋 조건 규칙'));
    condList.forEach((r,i) => body.appendChild(buildRC(r, ro, i===0, i===condList.length-1)));
  }

  const tot = (p.condRules?.length||0) + (p.itemRules?.length||0);
  document.getElementById('ruleCnt').textContent = tot + '/50';
  updateFallbackRow();
}

function buildRC(r, readOnly, isFirst, isLast) {
  const isCond = r._type === 'cond';
  const div = el('div', 'rc ' + (isCond ? 'rc-cond' : 'rc-item')
    + (r.id===S.selRuleId?' sel':'') + (r.enabled?'':' disabled-r') + (readOnly?' rc-readonly':''));

  if (!readOnly) {
    const mv = el('div','rc-move');
    const upB = el('button','','▲'); upB.title='위로'; if(isFirst) upB.disabled=true;
    upB.onclick = e => { e.stopPropagation(); moveRule(r.id, r._type, -1); };
    const dnB = el('button','','▼'); dnB.title='아래로'; if(isLast) dnB.disabled=true;
    dnB.onclick = e => { e.stopPropagation(); moveRule(r.id, r._type, 1); };
    mv.appendChild(upB); mv.appendChild(dnB); div.appendChild(mv);
  }

  // 타입 아이콘
  const ico = el('span','rc-type-ico', isCond ? '⚙' : '📦');
  div.appendChild(ico);

  div.appendChild(el('span','rc-num',''+r.priority));

  const tog = document.createElement('label'); tog.className='tog';
  const inp = document.createElement('input'); inp.type='checkbox'; inp.checked=r.enabled;
  inp.onchange = e => { e.stopPropagation(); if(!readOnly) toggleRuleEnabled(r.id, r._type); };
  tog.onclick = e => e.stopPropagation();
  const sl = document.createElement('div'); sl.className='tog-sl';
  tog.appendChild(inp); tog.appendChild(sl); div.appendChild(tog);

  const info = el('div','rc-info');
  info.appendChild(el('div','rc-name', r.name||('규칙 #'+r.priority)));
  info.appendChild(el('div','rc-sum', buildRuleSummary(r)));
  div.appendChild(info);

  // 배지는 인라인(flex)으로
  const badge = el('span','rc-badge '+(isCond?'b-cond':'b-item'), isCond?'조건':'아이템');
  div.appendChild(badge);

  if (!readOnly) {
    const acts = el('div','rc-acts');
    const cp = el('button','','⊕'); cp.title='복사'; cp.onclick = e => { e.stopPropagation(); dupRule(r.id,r._type); }; acts.appendChild(cp);
    const dl = el('button','','✕'); dl.title='삭제'; dl.onclick = e => { e.stopPropagation(); delRule(r.id,r._type); }; acts.appendChild(dl);
    div.appendChild(acts);
  }

  div.onclick = () => selectRule(r.id, r._type);
  return div;
}

function buildRuleSummary(r) {
  if (r._type === 'item' || r.type === 'item') return (r.itemKeys?.length||0)+'개 아이템';
  return buildCondSummary(r.cond);
}

function buildCondSummary(cond) {
  if (!cond) return '조건 없음';
  const parts = [];
  const c = cond;
  if (c.ItemName?.enabled && c.ItemName.text) parts.push('이름:"'+c.ItemName.text+'"');
  if (c.ItemType?.enabled && c.ItemType.values?.length) parts.push('대분류:'+c.ItemType.values.map(k=>D_ITEM_TYPE.find(x=>x.key===k)?.label||k).join(','));
  if (c.ItemSubType?.enabled && c.ItemSubType.values?.length) parts.push('중분류:'+c.ItemSubType.values.map(k=>{for(const a of Object.values(D_SUB_TYPE)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(','));
  if (c.EquipAttribute?.enabled && c.EquipAttribute.values?.length) parts.push('소분류:'+c.EquipAttribute.values.map(k=>{for(const a of Object.values(D_EQUIP_ATTR)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(','));
  if (c.ItemGrade?.enabled && c.ItemGrade.values?.length) parts.push('등급:'+c.ItemGrade.values.map(k=>D_GRADE.find(g=>g.key===k)?.label||k).join(','));
  if (c.ItemQuality?.enabled && c.ItemQuality.values?.length) parts.push('퀄리티:'+c.ItemQuality.values.map(k=>D_QUALITY.find(g=>g.key===k)?.label||k).join(','));
  if (c.ItemTier?.enabled) parts.push('티어:'+c.ItemTier.min+'~'+c.ItemTier.max);
  if (c.IsRelicItem?.enabled) parts.push(c.IsRelicItem.boolVal?'유물만':'비유물');
  if (c.RelicSetGroup?.enabled && c.RelicSetGroup.values?.length) parts.push('세트:'+c.RelicSetGroup.values.map(k=>D_RELIC_SET.find(r=>r.key===k)?.name||k).join(','));
  if (c.IsNamedItem?.enabled) parts.push(c.IsNamedItem.boolVal?'네임드만':'비네임드');
  if (c.NamedItemType?.enabled && c.NamedItemType.text) parts.push('네임드타입:"'+c.NamedItemType.text+'"');
  if (c.ItemOptionName?.enabled && c.ItemOptionName.values?.length) parts.push('옵션:'+c.ItemOptionName.values.length+'개');
  return parts.length ? parts.join(' · ') : '조건 없음';
}

function getAutoRuleName(rule) {
  if (rule.type !== 'cond' || !rule.cond) return rule.name || '규칙 #' + rule.priority;
  const c = rule.cond;
  const parts = [];
  if (c.ItemType?.enabled || c.ItemSubType?.enabled || c.EquipAttribute?.enabled) {
    const typeLabel = (c.ItemType?.values||[]).map(k=>D_ITEM_TYPE.find(x=>x.key===k)?.label||k)[0];
    const subLabel = (c.ItemSubType?.values||[]).map(k=>{for(const a of Object.values(D_SUB_TYPE)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;})[0];
    const attrLabel = (c.EquipAttribute?.values||[]).map(k=>{for(const a of Object.values(D_EQUIP_ATTR)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;})[0];
    parts.push(attrLabel || subLabel || typeLabel || '유형');
  }
  if (c.ItemGrade?.enabled && c.ItemGrade.values?.length) parts.push('등급');
  if (c.ItemQuality?.enabled && c.ItemQuality.values?.length) parts.push('퀄리티');
  if (c.ItemTier?.enabled) parts.push('티어');
  if (c.IsRelicItem?.enabled) parts.push('유물');
  if (c.RelicSetGroup?.enabled && c.RelicSetGroup.values?.length) parts.push('유물세트');
  if (c.IsNamedItem?.enabled) parts.push('네임드');
  if (c.ItemOptionName?.enabled && c.ItemOptionName.values?.length) parts.push('옵션');
  return parts.length > 0 ? parts.join(', ') : rule.name || '규칙 #' + rule.priority;
}

function renderItemBrowser(rule, ro) {
  const body = document.getElementById('itemBrowserBody');
  if (!body) return;
  body.innerHTML = '';

  const TABS = ['무기','장신구','오행장비','유물'];
  const keys = new Set(rule.itemKeys || []);

  // Selected count bar + toggle
  const cntBar = el('div','ib-cnt-bar');
  cntBar.style.cssText = 'display:flex;align-items:center;justify-content:space-between';
  const cntText = el('span','');
  cntText.textContent = '선택된 아이템: ' + keys.size + '개';
  cntBar.appendChild(cntText);
  if (keys.size > 0) {
    const toggleBtn = el('button','');
    toggleBtn.style.cssText = 'background:none;border:none;color:#7eb8f7;cursor:pointer;font-size:11px;padding:0;flex-shrink:0;text-decoration:underline';
    toggleBtn.textContent = _iShowSelected ? '▲ 숨기기' : '▼ 선택 목록';
    toggleBtn.onclick = () => { _iShowSelected = !_iShowSelected; renderItemBrowser(rule, ro); };
    cntBar.appendChild(toggleBtn);
  } else {
    _iShowSelected = false;
  }
  body.appendChild(cntBar);

  // Selected items panel (collapsible)
  if (_iShowSelected && keys.size > 0) {
    const selPanel = el('div','');
    selPanel.style.cssText = 'max-height:120px;overflow-y:auto;background:#252840;border-bottom:1px solid var(--bd);padding:6px 10px;display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0';
    const selItems = BUILTIN_EQUIP_DB.filter(it => keys.has(it.key));
    selItems.forEach(it => {
      const chip = el('span','');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:2px;background:#3a3d52;border:1px solid #4f5270;border-radius:10px;padding:2px 7px 2px 8px;font-size:11px;color:#c8d0e8';
      const nm = el('span',''); nm.textContent = it.name;
      chip.appendChild(nm);
      if (!ro) {
        const x = el('button','');
        x.textContent = '×';
        x.style.cssText = 'background:none;border:none;color:#9ab;cursor:pointer;font-size:13px;padding:0 0 1px 2px;line-height:1;flex-shrink:0';
        x.onclick = e => {
          e.stopPropagation();
          rule.itemKeys = (rule.itemKeys||[]).filter(k => k !== it.key);
          markDirty(); renderRules(); renderItemBrowser(rule, ro);
        };
        chip.appendChild(x);
      }
      selPanel.appendChild(chip);
    });
    body.appendChild(selPanel);
  }

  // Tab bar
  const tabBar = el('div','ib-tabs');
  TABS.forEach(tab => {
    const tabItems = BUILTIN_EQUIP_DB.filter(it => it.sub === tab);
    const tabSel = tabItems.filter(it => keys.has(it.key)).length;
    const b = document.createElement('button');
    b.className = 'ib-tab' + (tab === _iBrowserTab ? ' on' : '');
    b.textContent = tab + (tabSel > 0 ? ' (' + tabSel + ')' : '');
    b.onclick = () => { _iBrowserTab = tab; _iSearch = ''; renderItemBrowser(rule, ro); };
    tabBar.appendChild(b);
  });
  body.appendChild(tabBar);

  // Search bar
  const sr = el('div','ib-search-row');
  const searchIcon = el('span',''); searchIcon.textContent = '🔍';
  searchIcon.style.cssText = 'font-size:12px;flex-shrink:0;opacity:.5';
  sr.appendChild(searchIcon);
  const sinp = document.createElement('input');
  sinp.className = 'ib-search-inp';
  sinp.placeholder = '이름 검색...';
  sinp.value = _iSearch;
  let _composing = false;
  sinp.addEventListener('compositionstart', () => { _composing = true; });
  sinp.addEventListener('compositionend', () => {
    _composing = false;
    _iSearch = sinp.value;
    renderItemBrowser(rule, ro);
    document.getElementById('itemBrowserBody')?.querySelector('.ib-search-inp')?.focus();
  });
  sinp.addEventListener('input', () => {
    if (_composing) return;
    _iSearch = sinp.value;
    renderItemBrowser(rule, ro);
    document.getElementById('itemBrowserBody')?.querySelector('.ib-search-inp')?.focus();
  });
  if (_iSearch) {
    const clr = el('button',''); clr.textContent = '✕';
    clr.style.cssText = 'background:none;border:none;cursor:pointer;color:var(--muted);font-size:12px;padding:0 2px;flex-shrink:0';
    clr.onclick = () => { _iSearch = ''; renderItemBrowser(rule, ro); };
    sr.appendChild(sinp); sr.appendChild(clr);
  } else {
    sr.appendChild(sinp);
  }
  body.appendChild(sr);

  // Filter
  const tabItems = BUILTIN_EQUIP_DB.filter(it => it.sub === _iBrowserTab);
  const filtered = _iSearch ? tabItems.filter(it => it.name.includes(_iSearch)) : tabItems;

  // Scrollable list
  const list = el('div','ib-list');

  if (!filtered.length) {
    const empty = el('div','');
    empty.style.cssText = 'padding:20px;text-align:center;color:var(--muted);font-size:12px';
    empty.textContent = '검색 결과가 없습니다';
    list.appendChild(empty);
    body.appendChild(list);
    return;
  }

  // Tab-level select-all row
  const tabAllChk = filtered.every(it => keys.has(it.key));
  const tabSomeChk = filtered.some(it => keys.has(it.key));
  const allRow = el('div','ib-all');
  const allCk = document.createElement('input'); allCk.type = 'checkbox';
  allCk.checked = tabAllChk; allCk.indeterminate = !tabAllChk && tabSomeChk;
  allCk.disabled = ro;
  if (!ro) allCk.onchange = () => {
    if (!rule.itemKeys) rule.itemKeys = [];
    if (allCk.checked) {
      const exist = new Set(rule.itemKeys);
      filtered.forEach(it => { if (!exist.has(it.key)) rule.itemKeys.push(it.key); });
    } else {
      const rem = new Set(filtered.map(it => it.key));
      rule.itemKeys = rule.itemKeys.filter(k => !rem.has(k));
    }
    markDirty(); renderRules(); renderItemBrowser(rule, ro);
  };
  allRow.appendChild(allCk);
  const allLabel = el('span','');
  allLabel.style.cssText = 'font-size:13px;font-weight:600;margin-left:2px';
  allLabel.textContent = _iBrowserTab + ' 전체 (' + filtered.length + '개)';
  allRow.appendChild(allLabel);
  list.appendChild(allRow);

  // Group by attr (preserve insertion order)
  const groups = new Map();
  filtered.forEach(it => {
    if (!groups.has(it.attr)) groups.set(it.attr, []);
    groups.get(it.attr).push(it);
  });

  groups.forEach((items, attr) => {
    const expanded = _iExpanded[attr] === true;
    const grpAll = items.every(it => keys.has(it.key));
    const grpSome = items.some(it => keys.has(it.key));

    const ghdr = el('div','ib-grp-hdr');
    const gck = document.createElement('input'); gck.type = 'checkbox';
    gck.checked = grpAll; gck.indeterminate = !grpAll && grpSome;
    gck.disabled = ro;
    if (!ro) gck.onchange = e => {
      e.stopPropagation();
      if (!rule.itemKeys) rule.itemKeys = [];
      if (gck.checked) {
        const exist = new Set(rule.itemKeys);
        items.forEach(it => { if (!exist.has(it.key)) rule.itemKeys.push(it.key); });
      } else {
        const rem = new Set(items.map(it => it.key));
        rule.itemKeys = rule.itemKeys.filter(k => !rem.has(k));
      }
      markDirty(); renderRules(); renderItemBrowser(rule, ro);
    };
    ghdr.appendChild(gck);

    const ghdrName = el('span','');
    ghdrName.style.cssText = 'flex:1;font-size:13px;font-weight:500;margin-left:2px';
    ghdrName.textContent = attr;
    ghdr.appendChild(ghdrName);

    const ghdrCnt = el('span','');
    ghdrCnt.style.cssText = 'font-size:11px;color:var(--muted);margin-right:4px';
    ghdrCnt.textContent = items.length + '개';
    ghdr.appendChild(ghdrCnt);

    const ghdrArr = el('span','');
    ghdrArr.style.cssText = 'font-size:10px;color:var(--muted)';
    ghdrArr.textContent = expanded ? '▲' : '▼';
    ghdr.appendChild(ghdrArr);

    ghdr.onclick = e => {
      if (e.target.type === 'checkbox') return;
      _iExpanded[attr] = !expanded;
      renderItemBrowser(rule, ro);
    };
    list.appendChild(ghdr);

    if (expanded) {
      items.forEach(it => {
        const row = el('div','ib-row' + (keys.has(it.key) ? ' on' : ''));
        const ck = document.createElement('input'); ck.type = 'checkbox';
        ck.checked = keys.has(it.key); ck.disabled = ro;
        ck.onchange = () => {
          if (!rule.itemKeys) rule.itemKeys = [];
          if (ck.checked) {
            if (!rule.itemKeys.includes(it.key)) rule.itemKeys.push(it.key);
          } else {
            rule.itemKeys = rule.itemKeys.filter(k => k !== it.key);
          }
          markDirty(); renderRules(); renderItemBrowser(rule, ro);
        };
        row.appendChild(ck);
        const rowName = el('span','');
        rowName.style.cssText = 'flex:1;font-size:12px';
        rowName.textContent = it.name;
        row.appendChild(rowName);
        const rowKey = el('span','');
        rowKey.style.cssText = 'font-size:10px;color:#b07030;font-family:monospace';
        rowKey.textContent = it.key;
        row.appendChild(rowKey);
        list.appendChild(row);
      });
    }
  });

  body.appendChild(list);
}

// ── dirty / save ──
function markDirty() {
  if (!S.isDirty) { S.isDirty = true; updateSaveBtn(); }
}
function updateSaveBtn() {
  const btn = document.getElementById('savePBtn');
  if (!btn) return;
  const p = curPreset();

  btn.style.color = en ? '#fff' : '';
