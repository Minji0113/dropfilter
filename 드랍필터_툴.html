// ── slot helpers ──
function ensureUiSlots(rule) {
  if (rule.uiSlots) return;
  rule.uiSlots = [];
  // 기존 조건에서 마이그레이션
  FILTER_CATS.forEach(cat => {
    const hasActive = (cat.allKeys||cat.keys).some(k => rule.cond?.[k]?.enabled);
    if (hasActive) rule.uiSlots.push({catId: cat.id});
  });
}

function clearSlotConditions(rule, catId) {
  const cat = FILTER_CATS.find(c => c.id === catId);
  if (!cat || !rule.cond) return;
  (cat.allKeys || cat.keys).forEach(k => {
    if (!rule.cond[k]) return;
    rule.cond[k].enabled = false;
    if (Array.isArray(rule.cond[k].values)) rule.cond[k].values = [];
    if (rule.cond[k].text !== undefined) rule.cond[k].text = '';
    if (rule.cond[k].min !== undefined) rule.cond[k].min = 0;
    if (rule.cond[k].max !== undefined) rule.cond[k].max = 99;
  });
}

// ── 멀티슬롯 조건 렌더러 ──
function renderCondPaneSlots(rule, ro) {
  const catTabsEl = document.getElementById('catTabs');
  if (catTabsEl) catTabsEl.style.display = 'none';
  document.getElementById('condPane').style.display = '';
  document.getElementById('itemBody').style.display = 'none';
  document.getElementById('summarySection').style.display = '';

  ensureUiSlots(rule);
  const form = document.getElementById('condForm');
  const rightPane = document.getElementById('rightPane');
  form.innerHTML = '';

  const hasActive = rule.uiSlots.some(s => s.catId);

  if (rightPane) {
    rightPane.style.display = hasActive ? 'flex' : 'none';
    rightPane.style.flexDirection = 'column';
  }
  if (hasActive) { renderSummary(rule); renderAction(rule, ro); }

  // 초기 빈 상태
  if (rule.uiSlots.length === 0) {
    const ph = el('div','slot-ph','조건을 추가해주세요');
    form.appendChild(ph);
    if (!ro) {
      const addBtn = el('button','btn-full add','+ 조건 추가');
      addBtn.style.cssText = 'margin:0 16px 16px';
      addBtn.onclick = () => { rule.uiSlots.push({catId:null}); renderCondPaneSlots(rule, ro); };
      form.appendChild(addBtn);
    }
    return;
  }

  // 슬롯 목록 렌더링
  const listWrap = el('div','');
  listWrap.style.cssText = 'padding:8px;display:flex;flex-direction:column;gap:6px';

  rule.uiSlots.forEach((slot, idx) => {
    const isEmpty = !slot.catId;
    const slotWrap = el('div', isEmpty ? 'slot-empty-row' : 'cond-slot-wrap');

    // 슬롯 헤더 행
    const slotRow = el('div','cond-slot-row');
    if (isEmpty) slotRow.style.borderBottom = 'none';

    // FilterType 드롭다운
    const sel = document.createElement('select');
    sel.className = 'cat-dropsel';
    sel.style.flex = '1';
    const phOpt = document.createElement('option'); phOpt.value=''; phOpt.textContent='── FilterType 선택 ──'; sel.appendChild(phOpt);
    FILTER_CATS.forEach(cat => {
      const alreadyUsed = rule.uiSlots.some((s,i) => i!==idx && s.catId===cat.id);
      const opt = document.createElement('option');
      opt.value = cat.id; opt.textContent = cat.label;
      if (alreadyUsed) opt.disabled = true;
      if (slot.catId === cat.id) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!ro) sel.onchange = () => {
      const prev = slot.catId;
      slot.catId = sel.value || null;
      if (prev && prev !== slot.catId) clearSlotConditions(rule, prev);
      markDirty();
      renderCondPaneSlots(rule, ro);
      renderRules();
    };
    if (ro) sel.disabled = true;
    slotRow.appendChild(sel);

    // × 제거 버튼
    if (!ro) {
      const xBtn = el('button','');
      xBtn.style.cssText = 'background:none;border:1px solid var(--bdl);border-radius:4px;padding:3px 9px;cursor:pointer;font-size:14px;color:var(--err);flex-shrink:0;line-height:1';
      xBtn.textContent = '×';
      xBtn.title = '이 조건 제거';
      xBtn.onclick = () => {
        if (slot.catId) clearSlotConditions(rule, slot.catId);
        rule.uiSlots.splice(idx, 1);
        markDirty();
        renderCondPaneSlots(rule, ro);
        renderRules();
      };
      slotRow.appendChild(xBtn);
    }

    slotWrap.appendChild(slotRow);

    // 조건 설정 바디 (슬롯이 채워진 경우)
    if (slot.catId) {
      const cat = FILTER_CATS.find(c => c.id === slot.catId);
      if (cat) {
        const slotBody = el('div','cond-slot-body');
        cat.keys.forEach(key => {
          const meta = COND_META[key]; if (!meta) return;
          const c = rule.cond?.[key] || {enabled:false};
          slotBody.appendChild(buildCondBlock(key, meta, c, rule, ro));
        });
        slotWrap.appendChild(slotBody);
      }
    }

    listWrap.appendChild(slotWrap);
  });

  // 빈 슬롯이 없을 때 하단 + 버튼
  if (!ro && !rule.uiSlots.some(s => !s.catId)) {
    const addBtn = el('button','btn-full add','+ 조건 추가');
    addBtn.style.cssText = 'margin-top:4px';
    addBtn.onclick = () => { rule.uiSlots.push({catId:null}); renderCondPaneSlots(rule, ro); };
    listWrap.appendChild(addBtn);
  }

  form.appendChild(listWrap);
}

function buildCondBlock(key, meta, c, rule, ro) {
  const wrap = el('div','cond-block');
  const hdr = el('div','cond-hdr'+(c.enabled?' active':'')+(c.enabled?' open':''));
  const ck = el('div','cond-check'+(c.enabled?' on':''));
  hdr.appendChild(ck);
  hdr.appendChild(el('span','cond-label',meta.label));
  const prev = el('span','cond-preview', getCondPreview(key, c, rule)); hdr.appendChild(prev);
  hdr.appendChild(el('span','cond-arrow','▶'));

  const body = el('div','cond-body'+(c.enabled?' open':''));
  body.appendChild(buildCondInput(key, meta, c, rule, ro));

  hdr.onclick = () => {
    if (ro) return;
    if (!rule.cond) rule.cond = mkCond();
    if (!rule.cond[key]) rule.cond[key] = { enabled:false };
    rule.cond[key].enabled = !rule.cond[key].enabled;
    // ItemType 비활성화 시 하위 계층도 초기화
    if (key === 'ItemType' && !rule.cond[key].enabled) {
      if(rule.cond.ItemSubType){ rule.cond.ItemSubType.enabled=false; rule.cond.ItemSubType.values=[]; }
      if(rule.cond.EquipAttribute){ rule.cond.EquipAttribute.enabled=false; rule.cond.EquipAttribute.values=[]; }
    }
    markDirty();
    renderCondPaneSlots(rule, ro);
    renderRules();
  };
  wrap.appendChild(hdr); wrap.appendChild(body);
  return wrap;
}

function getCondPreview(key, c, rule) {
  if (!c.enabled) return '';
  switch(key) {
    case 'ItemName': return c.text ? '"'+c.text+'"' : '';
    case 'ItemType': {
      const tl = (c.values||[]).map(k=>D_ITEM_TYPE.find(x=>x.key===k)?.label||k);
      const sl = (rule.cond.ItemSubType?.values||[]).map(k=>{for(const a of Object.values(D_SUB_TYPE)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;});
      const al = (rule.cond.EquipAttribute?.values||[]).map(k=>{for(const a of Object.values(D_EQUIP_ATTR)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;});
      return [...tl,...sl,...al].join(',') || '';
    }
    case 'ItemSubType': return c.values?.map(k=>{for(const a of Object.values(D_SUB_TYPE)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(',') || '';
    case 'EquipAttribute': return c.values?.map(k=>{for(const a of Object.values(D_EQUIP_ATTR)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(',') || '';
    case 'ItemGrade': return c.values?.map(k=>D_GRADE.find(g=>g.key===k)?.label||k).join(',') || '';
    case 'ItemQuality': return c.values?.map(k=>D_QUALITY.find(g=>g.key===k)?.label||k).join(',') || '';
    case 'ItemTier': return c.min+'~'+c.max;
    case 'IsRelicItem': return c.boolVal?'유물만':'비유물';
    case 'RelicSetGroup': return (c.values?.length||0)+'개 선택';
    case 'IsNamedItem': return c.boolVal?'네임드만':'비네임드';
    case 'NamedItemType': return c.text||'';
    case 'ItemOptionName': return (c.values?.length||0)+'개 선택';
    default: return '';
  }
}

function buildCondInput(key, meta, c, rule, ro) {
  const wrap = document.createElement('div');
  if (!c.enabled) { wrap.innerHTML = '<span style="font-size:12px;color:var(--muted)">항목을 클릭해 조건을 활성화하세요</span>'; return wrap; }

  const upd = () => {
    markDirty(); renderSummary(rule); renderRules();
    // update preview in this block header
    const parent = wrap.closest('.cond-block');
    if (parent) { const prev = parent.querySelector('.cond-preview'); if(prev) prev.textContent = getCondPreview(key, rule.cond[key], rule); }
  };

  const getCond = () => { if(!rule.cond[key]) rule.cond[key]={enabled:true}; return rule.cond[key]; };

  switch(key) {
    case 'ItemName': {
      const inp = document.createElement('input'); inp.className='styled-input'; inp.type='text';
      inp.value=c.text||''; inp.placeholder='아이템 이름 검색 (포함 텍스트)'; inp.disabled=ro;
      inp.oninput = () => { getCond().text = inp.value; upd(); };
      wrap.appendChild(inp); break;
    }
    case 'ItemType': {
      wrap.appendChild(buildHierDropdowns(rule, ro, upd)); break;
    }
    case 'ItemGrade':
      wrap.appendChild(buildChips(D_GRADE, c.values||[], key, rule, ro, upd)); break;
    case 'ItemQuality':
      wrap.appendChild(buildChips(D_QUALITY, c.values||[], key, rule, ro, upd)); break;
    case 'ItemTier': {
      const row = el('div','tier-range');
      const mn = document.createElement('input'); mn.type='number'; mn.min=0; mn.max=10; mn.value=c.min??0; mn.disabled=ro;
      mn.oninput = () => { getCond().min = +mn.value; upd(); };
      const mx = document.createElement('input'); mx.type='number'; mx.min=0; mx.max=10; mx.value=c.max??10; mx.disabled=ro;
      mx.oninput = () => { getCond().max = +mx.value; upd(); };
      row.appendChild(mn); row.appendChild(el('span','','~')); row.appendChild(mx);
      wrap.appendChild(row); break;
    }
    case 'IsRelicItem': case 'IsNamedItem': {
      const trueLabel = key==='IsRelicItem'?'유물 아이템만':'네임드 아이템만';
      const falseLabel = key==='IsRelicItem'?'비유물만':'비네임드만';
      const row = el('div','bool-row');
      [true,false].forEach(v => {
        const lbl = document.createElement('label'); lbl.className='ck';
        const inp = document.createElement('input'); inp.type='radio'; inp.name=key+'_'+rule.id; inp.disabled=ro;
        inp.checked = (c.boolVal===v || (c.boolVal===undefined&&v===true));
        inp.onchange = () => { if(inp.checked){ getCond().boolVal=v; upd(); } };
        lbl.appendChild(inp); lbl.appendChild(document.createTextNode(v?trueLabel:falseLabel));
        row.appendChild(lbl);
      });
      wrap.appendChild(row); break;
    }
    case 'RelicSetGroup': {
      const chips = el('div','chips');
      D_RELIC_SET.forEach(rs => {
        const ch = el('span','chip'+((c.values||[]).includes(rs.key)?' on':''), rs.name);
        if (!ro) ch.onclick = () => { toggleArr(getCond(),'values',rs.key); upd(); renderCondForm(rule,ro); };
        chips.appendChild(ch);
      });
      wrap.appendChild(chips); break;
    }
    case 'NamedItemType': {
      const inp = document.createElement('input'); inp.className='styled-input'; inp.type='text';
      inp.value=c.text||''; inp.placeholder='Enum 미확정 — 키워드 직접 입력'; inp.disabled=ro;
      inp.oninput = () => { getCond().text = inp.value; upd(); };
      const note = el('div','','⚠ 실제 Enum 목록 미확정');
      note.style.cssText='font-size:11px;color:var(--warn);margin-top:3px';
      wrap.appendChild(inp); wrap.appendChild(note); break;
    }
    case 'ItemOptionName': {
      const srch = document.createElement('input'); srch.className='opt-search'; srch.placeholder='옵션 이름 검색...'; srch.type='text'; srch.disabled=ro;
      srch.value = S.optSearch||'';
      const listDiv = el('div','opt-list');
      const renderOpts = () => {
        const q = (srch.value||'').toLowerCase();
        listDiv.innerHTML = '';
        OPTION_NAMES.filter(n=>!q||n.toLowerCase().includes(q)).forEach(n => {
          const row = el('div','opt-row'+((c.values||[]).includes(n)?' on':''));
          const ck2 = document.createElement('input'); ck2.type='checkbox'; ck2.checked=(c.values||[]).includes(n); ck2.disabled=ro;
          ck2.onchange = () => { toggleArr(getCond(),'values',n); upd(); renderOpts(); };
          row.appendChild(ck2);
          row.appendChild(el('span','',n));
          row.onclick = e => { if(e.target===row){ ck2.click(); } };
          listDiv.appendChild(row);
        });
      };
      srch.oninput = () => { S.optSearch=srch.value; renderOpts(); };
      renderOpts();
      const selCnt = el('div','',''); selCnt.style.cssText='font-size:11px;color:var(--accent);margin-top:3px';
      selCnt.textContent = (c.values?.length||0)+'개 선택됨';
      wrap.appendChild(srch); wrap.appendChild(listDiv); wrap.appendChild(selCnt); break;
    }
  }
  return wrap;
}

// 아이템 유형 계층 선택: 대분류 드롭박스 → 중분류 드롭박스 → 소분류 드롭박스 (캐스케이딩)
function buildHierDropdowns(rule, ro, upd) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px';

  const ensureCond = (key) => {
    if (!rule.cond[key]) rule.cond[key] = { enabled:false, values:[] };
    return rule.cond[key];
  };

  const rebuild = () => {
    wrap.innerHTML = '';

    // 대분류
    const l1 = el('span','il','대분류');
    const sel1 = document.createElement('select');
    sel1.className = 'cat-dropsel'; sel1.style.cssText = 'height:36px;font-size:13px';
    const ph1 = document.createElement('option'); ph1.value = ''; ph1.textContent = '── 대분류 선택 ──';
    sel1.appendChild(ph1);
    const curType = (rule.cond.ItemType?.values||[])[0] || '';
    D_ITEM_TYPE.forEach(it => {
      const o = document.createElement('option'); o.value = it.key; o.textContent = it.label;
      if (it.key === curType) o.selected = true;
      sel1.appendChild(o);
    });
    sel1.disabled = ro;
    if (!ro) sel1.onchange = () => {
      const cIT = ensureCond('ItemType');
      cIT.values = sel1.value ? [sel1.value] : []; cIT.enabled = !!sel1.value;
      ensureCond('ItemSubType').values = []; ensureCond('ItemSubType').enabled = false;
      ensureCond('EquipAttribute').values = []; ensureCond('EquipAttribute').enabled = false;
      upd(); rebuild();
    };
    wrap.appendChild(l1); wrap.appendChild(sel1);

    if (!curType) return;

    // 중분류
    const subs = D_SUB_TYPE[curType];
    if (!subs?.length) return;
    const l2 = el('span','il','중분류');
    const sel2 = document.createElement('select');
    sel2.className = 'cat-dropsel'; sel2.style.cssText = 'height:36px;font-size:13px';
    const ph2 = document.createElement('option'); ph2.value = ''; ph2.textContent = '── 중분류 선택 ──';
    sel2.appendChild(ph2);
    const curSub = (rule.cond.ItemSubType?.values||[])[0] || '';
    subs.forEach(st => {
      const o = document.createElement('option'); o.value = st.key; o.textContent = st.label;
      if (st.key === curSub) o.selected = true;
      sel2.appendChild(o);
    });
    sel2.disabled = ro;
    if (!ro) sel2.onchange = () => {
      const cST = ensureCond('ItemSubType');
      cST.values = sel2.value ? [sel2.value] : []; cST.enabled = !!sel2.value;
      ensureCond('EquipAttribute').values = []; ensureCond('EquipAttribute').enabled = false;
      upd(); rebuild();
    };
    wrap.appendChild(l2); wrap.appendChild(sel2);

    if (!curSub) return;

    // 소분류
    const attrs = D_EQUIP_ATTR[curSub];
    if (!attrs?.length) return;
    const l3 = el('span','il','소분류');
    const sel3 = document.createElement('select');
    sel3.className = 'cat-dropsel'; sel3.style.cssText = 'height:36px;font-size:13px';
    const ph3 = document.createElement('option'); ph3.value = ''; ph3.textContent = '── 소분류 선택 ──';
    sel3.appendChild(ph3);
    const curAttr = (rule.cond.EquipAttribute?.values||[])[0] || '';
    attrs.forEach(ea => {
      const o = document.createElement('option'); o.value = ea.key; o.textContent = ea.label;
      if (ea.key === curAttr) o.selected = true;
      sel3.appendChild(o);
    });
    sel3.disabled = ro;
    if (!ro) sel3.onchange = () => {
      const cEA = ensureCond('EquipAttribute');
      cEA.values = sel3.value ? [sel3.value] : []; cEA.enabled = !!sel3.value;
      upd(); rebuild();
    };
    wrap.appendChild(l3); wrap.appendChild(sel3);
  };

  rebuild();
  return wrap;
}

function buildAttrChips(rule, ro, upd, filteredSubs) {
  const wrap = el('div','chips');
  const validAttrs = filteredSubs ? filteredSubs.flatMap(k=>D_EQUIP_ATTR[k]||[]) : Object.values(D_EQUIP_ATTR).flat();
  validAttrs.forEach(ea => {
    const on = (rule.cond.EquipAttribute?.values||[]).includes(ea.key);
    const ch = el('span','chip'+(on?' on':''), ea.label);
    if (!ro) ch.onclick = () => { toggleArr(rule.cond.EquipAttribute,'values',ea.key); upd(); };
    wrap.appendChild(ch);
  });
  return wrap;
}

function buildChips(items, selected, key, rule, ro, upd) {
  const wrap = el('div','chips');
  items.forEach(it => {
    const on = selected.includes(it.key);
    const ch = el('span','chip'+(on?' on':''), it.label);
    if (!ro) ch.onclick = () => {
      if (!rule.cond[key]) rule.cond[key] = { enabled:true, values:[] };
      toggleArr(rule.cond[key],'values',it.key);
      upd();
      // refresh chips
      wrap.querySelectorAll('.chip').forEach((c,i) => {
        c.className = 'chip'+(rule.cond[key].values.includes(items[i].key)?' on':'');
      });
    };
    wrap.appendChild(ch);
  });
  return wrap;
}

function renderSummary(rule) {
  const tags = document.getElementById('summaryTags');
  if (!tags) return;
  tags.innerHTML = '';
  const parts = buildSummaryParts(rule.cond);
  if (!parts.length) {
    tags.innerHTML = '<span class="sum-empty">조건 없음 — 전체 아이템에 적용</span>';
    return;
  }
  const op = rule.operator || 'AND';
  parts.forEach((p,i) => {
    const t = el('span','sum-tag');
    t.innerHTML = '<span class="st-key">'+p.key+'</span><span class="st-val">'+p.val+'</span>';
    tags.appendChild(t);
    if (i < parts.length-1) tags.appendChild(el('span','sum-op',op));
  });
}

function buildSummaryParts(cond) {
  if (!cond) return [];
  const parts = [];
  if (cond.ItemName?.enabled && cond.ItemName.text) parts.push({key:'이름',val:'"'+cond.ItemName.text+'"'});
  if (cond.ItemType?.enabled && cond.ItemType.values?.length) parts.push({key:'대분류',val:cond.ItemType.values.map(k=>D_ITEM_TYPE.find(x=>x.key===k)?.label||k).join(' / ')});
  if (cond.ItemSubType?.enabled && cond.ItemSubType.values?.length) parts.push({key:'중분류',val:cond.ItemSubType.values.map(k=>{for(const a of Object.values(D_SUB_TYPE)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(' / ')});
  if (cond.EquipAttribute?.enabled && cond.EquipAttribute.values?.length) parts.push({key:'소분류',val:cond.EquipAttribute.values.map(k=>{for(const a of Object.values(D_EQUIP_ATTR)){const f=a.find(x=>x.key===k);if(f)return f.label;}return k;}).join(' / ')});
  if (cond.ItemGrade?.enabled && cond.ItemGrade.values?.length) parts.push({key:'등급',val:cond.ItemGrade.values.map(k=>D_GRADE.find(g=>g.key===k)?.label||k).join(' / ')});
  if (cond.ItemQuality?.enabled && cond.ItemQuality.values?.length) parts.push({key:'퀄리티',val:cond.ItemQuality.values.map(k=>D_QUALITY.find(g=>g.key===k)?.label||k).join(' / ')});
  if (cond.ItemTier?.enabled) parts.push({key:'티어',val:cond.ItemTier.min+'~'+cond.ItemTier.max});
  if (cond.IsRelicItem?.enabled) parts.push({key:'유물여부',val:cond.IsRelicItem.boolVal?'유물만':'비유물'});
  if (cond.RelicSetGroup?.enabled && cond.RelicSetGroup.values?.length) parts.push({key:'세트',val:cond.RelicSetGroup.values.map(k=>D_RELIC_SET.find(r=>r.key===k)?.name||k).join(' / ')});
  if (cond.IsNamedItem?.enabled) parts.push({key:'네임드',val:cond.IsNamedItem.boolVal?'네임드만':'비네임드'});
  if (cond.NamedItemType?.enabled && cond.NamedItemType.text) parts.push({key:'네임드타입',val:'"'+cond.NamedItemType.text+'"'});
  if (cond.ItemOptionName?.enabled && cond.ItemOptionName.values?.length) parts.push({key:'옵션명',val:cond.ItemOptionName.values.length+'개 선택'});
  return parts;
}

function renderAction(rule, ro) {
  const act = rule.action || mkAction();
  document.getElementById('actLabelEn').checked = act.labelEnabled !== false;
  document.getElementById('actLabelEn').disabled = ro;
  const lblTxt = document.getElementById('actLabelEnTxt');
  lblTxt.textContent = act.labelEnabled!==false?'ON':'OFF';
  lblTxt.className = 'act-status ' + (act.labelEnabled!==false?'on':'off');
  buildColorPicker('fontColorPicker', act.labelFontColor, k => { if(!ro){ updateAction('labelFontColor', k); } });
  buildColorPicker('bgColorPicker', act.labelBgColor, k => { if(!ro){ updateAction('labelBgColor', k); } });
  document.getElementById('actFxEn').checked = !!act.fxEnabled;
  document.getElementById('actFxEn').disabled = ro;
  const fxTxt = document.getElementById('actFxEnTxt');
  fxTxt.textContent = act.fxEnabled?'ON':'OFF';
  fxTxt.className = 'act-status ' + (act.fxEnabled?'on':'off');
  document.getElementById('fxInt').value = act.fxIntensity??0;
  document.getElementById('fxInt').disabled = ro;
  document.getElementById('fxIntVal').textContent = act.fxIntensity??0;
  document.getElementById('actSndLand').checked = act.soundLand!==false;
  document.getElementById('actSndLand').disabled = ro;
  document.getElementById('actSndAir').checked = act.soundAir!==false;
  document.getElementById('actSndAir').disabled = ro;
}

function renderActionInto(rule, container, ro) {
  const act = rule.action || mkAction();
  container.innerHTML = '';
  const rows = [
    {label:'라벨 표시', html: `<label class="tog2"><input type="checkbox" ${act.labelEnabled!==false?'checked':''} ${ro?'disabled':''} onchange="updateAction('labelEnabled',this.checked)"><div class="tog2-sl"></div></label> <span class="act-status ${act.labelEnabled!==false?'on':'off'}">${act.labelEnabled!==false?'ON':'OFF'}</span>`},
    {label:'빛기둥 FX', html: `<label class="tog2"><input type="checkbox" ${act.fxEnabled?'checked':''} ${ro?'disabled':''} onchange="updateAction('fxEnabled',this.checked)"><div class="tog2-sl"></div></label> <span class="act-status ${act.fxEnabled?'on':'off'}">${act.fxEnabled?'ON':'OFF'}</span>`},
  ];
  rows.forEach(r => {
    const row = el('div','act-row');
    row.appendChild(el('span','act-label',r.label));
    const val = el('div','act-val'); val.innerHTML=r.html; row.appendChild(val);
    container.appendChild(row);
  });
}

function getAct() { const r=selRule(); if(!r)return mkAction(); if(!r.action)r.action=mkAction(); return r.action; }

function buildColorPicker(containerId, selected, onChange) {
  const c = document.getElementById(containerId); if(!c) return;
  c.innerHTML = '';
  const ns = el('div','csw none-sw'); ns.title='없음'; ns.onclick=()=>onChange(null);
  if (!selected) ns.style.border='2px solid var(--text)';
  c.appendChild(ns);
  COLOR_PAL.forEach((hex,i) => {
    const key = i+1;
    const sw = el('div','csw'+(selected===key?' on':'')); sw.style.background=hex; sw.title='Color_'+String(i+1).padStart(2,'0')+' '+hex;
    sw.onclick=()=>onChange(key); c.appendChild(sw);
  });
}

// ══ ACTIONS ══
function updateAction(field, val) {
  const a = getAct(); a[field] = val;
  const rule = selRule(); if (rule && !rule.action) rule.action = a;
  markDirty();
  renderAction(selRule(), isReadOnly());
}
function updateDefaultBehavior(val) { const p=curPreset(); if(p&&!isReadOnly()){ p.defaultBehavior=val; markDirty(); } }

// ══ SCRIPT PREVIEW TAB ══
function switchPanCTab(tab) {
  _panCTab = tab;
  document.querySelectorAll('.pc-tab').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  const wrap = document.getElementById('panCEditWrap');

  if (tab === 'edit') {
    wrap.style.display = '';
    prev.style.display = 'none';
  } else {
    wrap.style.display = 'none';

function renderScriptPreview() {
  const el = document.getElementById('spContent');
  if (!el) return;
  el.innerHTML = buildScriptPreview(curPreset());
}

function buildActionComment(act) {
  if (!act) return '—';
  const lb = act.labelEnabled !== false ? 'ON' : 'OFF';
  const lc = (act.labelEnabled !== false && act.labelColor) ? ' 글자' + act.labelColor : '';
  const bc = act.bgColor ? ' 배경' + act.bgColor : '';
  const fx = act.fxEnabled ? 'ON(강도' + (act.fxIntensity||0) + ')' : 'OFF';
  const snd = '착지' + (act.soundLand !== false ? 'ON' : 'OFF') + ' 공중' + (act.soundAir !== false ? 'ON' : 'OFF');
  return '라벨' + lb + lc + bc + ' │ 빛기둥' + fx + ' │ 사운드 ' + snd;
}

function buildScriptPreview(p) {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  if (!p) return '<span class="sp-cmt"># 프리셋을 선택하세요</span>';
  if (p.isSystem) return '<span class="sp-cmt"># 시스템 프리셋은 미리보기를 지원하지 않습니다.\n# 커스텀 프리셋을 선택하세요.</span>';

  const out = [];
  const cmt   = t => out.push('<span class="sp-cmt">' + esc(t) + '</span>');
  const kv    = (ind, k, v) => out.push(
    esc(ind) + '<span class="sp-key">' + esc(k.padEnd(26)) + '</span><span class="sp-str">' + esc(String(v)) + '</span>'
  );
  const blank = () => out.push('');
  const ck    = n => n ? 'Color_' + String(n).padStart(2,'0') : null;

  const wa = (act, ind) => {
    const a = act || {};
    const lbl = a.labelEnabled !== false;
    kv(ind, 'Label', lbl ? 'On' : 'Off');
    const fc = ck(a.labelFontColor), bc = ck(a.labelBgColor);
    if (lbl && fc) kv(ind, 'LabelColor', fc);
    if (lbl && bc) kv(ind, 'LabelBg', bc);
    if (a.fxEnabled) kv(ind, 'Highlight', String(a.fxIntensity ?? 0));
    kv(ind, 'Sound',
      (a.soundLand !== false ? 'On' : 'Off') + '  ' +
      (a.soundAir  !== false ? 'On' : 'Off'));
  };

  const now = new Date().toISOString().slice(0,10);
  const ir = (p.itemRules||[]).slice().sort((a,b)=>a.priority-b.priority);
  const cr = (p.condRules||[]).slice().sort((a,b)=>a.priority-b.priority);

  // ── 헤더
  cmt('# NUT Drop Filter  v1.0');
  cmt('# Preset:          ' + p.name);
  cmt('# DefaultBehavior: ' + (p.defaultBehavior === 'HideAll' ? 'HideAll' : 'Default'));
  cmt('# Exported:        ' + now);

  // ── 개별 아이템 규칙
  if (ir.length) {
    blank();
    cmt('# ── 개별 아이템 규칙 (최우선 검사) ─────────────────────────────────────');
    ir.forEach(r => {
      blank();
      const keys = r.itemKeys || [];
      const hint = keys.slice(0,3)
        .map(k => BUILTIN_EQUIP_DB.find(x=>x.key===k)?.name || String(k))
        .join(', ') + (keys.length > 3 ? ' 외 '+(keys.length-3)+'개' : '');
      if (hint) cmt('# ' + hint);
      out.push('<span style="color:#F1F5F9;font-weight:600">' + esc('ItemGroup ' + r.priority) +
               (r.enabled !== false ? '' : ' <span class="sp-cmt"># 비활성</span>') + '</span>');
      kv('    ', 'Enabled', r.enabled !== false ? 'True' : 'False');
      if (keys.length) kv('    ', 'Items', keys.join(' '));
      wa(r.action, '    ');
    });
  }

  // ── 조건 규칙
  if (cr.length) {
    blank();
    cmt('# ── 조건 규칙 (Priority 오름차순 검사) ──────────────────────────────────');
    cr.forEach(r => {
      blank();
      const c = r.cond || {};
      out.push('<span style="color:#F1F5F9;font-weight:600">' + esc('Rule ' + r.priority) +
               (r.enabled !== false ? '' : ' <span class="sp-cmt"># 비활성</span>') + '</span>');
      kv('    ', 'Enabled', r.enabled !== false ? 'True' : 'False');
      if (c.ItemGrade?.enabled && c.ItemGrade.values?.length)
        kv('    ', 'DropFilterCheckType_04', c.ItemGrade.values.join(' '));
      if (c.ItemType?.enabled && c.ItemType.values?.length)
        kv('    ', 'DropFilterCheckType_01', c.ItemType.values.join(' '));
      if (c.ItemSubType?.enabled && c.ItemSubType.values?.length)
        kv('    ', 'DropFilterCheckType_02', c.ItemSubType.values.join(' '));
      if (c.EquipAttribute?.enabled && c.EquipAttribute.values?.length)
        kv('    ', 'DropFilterCheckType_03', c.EquipAttribute.values.join(' '));
      if (c.IsRelicItem?.enabled)
        kv('    ', 'DropFilterCheckType_05', c.IsRelicItem.boolVal ? 'True' : 'False');
      if (c.RelicSetGroup?.enabled && c.RelicSetGroup.values?.length)
        kv('    ', 'DropFilterCheckType_05_Set', c.RelicSetGroup.values.join(' '));
      if (c.ItemTier?.enabled) {
        kv('    ', 'DropFilterCheckType_06_Min', String(c.ItemTier.min ?? 0));
        kv('    ', 'DropFilterCheckType_06_Max', String(c.ItemTier.max ?? 10));
      }
      if (c.IsNamedItem?.enabled)
        kv('    ', 'DropFilterCheckType_08', c.IsNamedItem.boolVal ? 'True' : 'False');
      if (c.ItemQuality?.enabled && c.ItemQuality.values?.length)
        kv('    ', 'DropFilterCheckType_11', c.ItemQuality.values.join(' '));
      if (c.ItemOptionName?.enabled && c.ItemOptionName.values?.length)
        kv('    ', 'DropFilterCheckType_14', c.ItemOptionName.values.join(' '));
      wa(r.action, '    ');
    });
  }

  if (!ir.length && !cr.length) { blank(); cmt('# (규칙 없음)'); }

  return out.join('\n');
}

function updateFallbackRow() {
  const p = curPreset();
  const sel = document.getElementById('defBehavior');
  if (!sel) return;
  sel.value = p?.defaultBehavior || 'Default';
  sel.disabled = !p || p.isEditable === false;
}
function updateItemKeys() {
  const r=selRule(); if(!r||r.type!=='item') return;
  const raw=document.getElementById('itemKeys').value;
  const keys=raw.split(/[\s,]+/).map(s=>s.trim()).filter(s=>s&&!isNaN(+s)).map(Number);
  r.itemKeys=keys; updateItemCnt(keys.length); markDirty(); renderRules();
}
function updateItemCnt(n) { const c=document.getElementById('itemCnt'); if(c) c.textContent=n+'개 입력됨'; }

// ══ PRESET ACTIONS ══
function selectPreset(id) {
  // eslint-disable-next-line eqeqeq
  if (id == S.curId) return;
  if (S.isDirty) {
    const p = curPreset();
    if (p && p.isEditable !== false) {
      const go = confirm(`"${p.name}" 프리셋에 저장되지 않은 변경사항이 있습니다.\n\n[확인] 저장하고 이동  /  [취소] 저장하지 않고 이동`);
      if (go) {
        savePreset();
        if (S.isDirty) return; // 검증 오류로 저장 실패 — 이동 취소
      }
    }
  }
  S.isDirty = false; S.curId=id; S.selRuleId=null; S.selRuleType=null;
  render(); updateSaveBtn();
}
function applyPreset() { S.appliedId=S.curId; renderPresets(); toast('프리셋 적용됨: '+(curPreset()?.name||'')); }
function toggleFav(id) { const p=S.presets.find(x=>x.id===id); if(p){p.isFavorite=!p.isFavorite;renderPresets();} }
function openAddPreset() {
  const cust=S.presets.filter(p=>!p.isSystem);
  if(cust.length>=20){toast('최대 20개','warn');return;}
  document.getElementById('addName').value=''; openModal('modalAdd');
  setTimeout(()=>document.getElementById('addName').focus(),50);
}
function confirmAdd() {
  const name=document.getElementById('addName').value.trim(); if(!name)return;
  const p={id:uid(),name,isSystem:false,isEditable:true,isFavorite:false,defaultBehavior:'Default',condRules:[],itemRules:[]};
  S.presets.push(p); closeModal('modalAdd'); selectPreset(p.id);
}
function openSaveAs() {
  document.getElementById('saveAsName').value=(curPreset()?.name||'')+'(복사)'; openModal('modalSaveAs');
  setTimeout(()=>document.getElementById('saveAsName').focus(),50);
}
function confirmSaveAs() {
  const name=document.getElementById('saveAsName').value.trim(); if(!name)return;
  const src=curPreset(); if(!src)return;
  const cust=S.presets.filter(p=>!p.isSystem);
  if(cust.length>=20){toast('최대 20개','warn');return;}
  const p=JSON.parse(JSON.stringify(src));
  p.id=uid(); p.name=name; p.isSystem=false; p.isEditable=true;
  p.condRules.forEach(r=>r.id=uid()); p.itemRules.forEach(r=>r.id=uid());
  S.presets.push(p); closeModal('modalSaveAs'); selectPreset(p.id);
}
function savePreset() {
  const p = curPreset();
  if (!p) return;
  if (p.isEditable === false) { toast('시스템 프리셋은 수정할 수 없습니다', 'warn'); return; }
  // 조건은 있지만 액션이 완전히 기본값인 규칙 경고
  const noActRules = (p.condRules||[]).filter(r => {
    if (!r.enabled) return false;
    if (buildCondSummary(r.cond) === '조건 없음') return false;
    const a = r.action;
    return a && a.labelEnabled && a.labelFontColor === null && a.labelBgColor === null && !a.fxEnabled;
  });
  if (noActRules.length > 0) {
    const msg = `다음 규칙에 드랍 연출(액션)이 기본값입니다:\n${noActRules.map(r=>'· '+r.name).join('\n')}\n\n색상 또는 FX를 지정하지 않으면 기본 표시로 처리됩니다.\n이대로 저장할까요?`;
    if (!confirm(msg)) return;
  }
  S.isDirty = false;
  updateSaveBtn();
  toast('💾 프리셋 저장됨');
}
function resetAll() { if(!confirm('초기화하시겠습니까?'))return; _uid=1; S={presets:[],curId:null,selRuleId:null,selRuleType:null,appliedId:null,catTab:'itemtype',optSearch:'',isDirty:false}; init(); }

// ══ RULE ACTIONS ══
function addCondRule() {
  const p=curPreset(); if(!p||p.isEditable===false)return;
  if((p.condRules?.length||0)>=50){toast('최대 50개','warn');return;}
  const maxP=Math.max(0,...(p.condRules||[]).map(r=>r.priority));
  const r=mkCondRule(maxP+1);
  if(!p.condRules)p.condRules=[];
  p.condRules.push(r); S.selRuleId=r.id; S.selRuleType='cond'; markDirty(); render();
}
function addItemRule() {
  const p=curPreset(); if(!p||p.isEditable===false)return;
  if((p.itemRules?.length||0)>=50){toast('최대 50개','warn');return;}
  const maxP=Math.max(0,...(p.itemRules||[]).map(r=>r.priority));
  const r=mkItemRule(maxP+1);
  if(!p.itemRules)p.itemRules=[];
  p.itemRules.push(r); S.selRuleId=r.id; S.selRuleType='item'; markDirty(); render();
}
function selectRule(id,type) { S.selRuleId=id; S.selRuleType=type; renderRules(); renderEdit(); }
function changeRuleType(type) {
  const rule=selRule(); const p=curPreset(); if(!rule||!p||isReadOnly())return;
  if(rule.type===type)return;
  if(rule.type==='cond'){ p.condRules=p.condRules.filter(r=>r.id!==rule.id); rule.type='item'; rule.itemKeys=[]; delete rule.cond; delete rule.operator; if(!p.itemRules)p.itemRules=[]; p.itemRules.push(rule); }
  else{ p.itemRules=p.itemRules.filter(r=>r.id!==rule.id); rule.type='cond'; rule.cond=mkCond(); rule.operator='AND'; delete rule.itemKeys; if(!p.condRules)p.condRules=[]; p.condRules.push(rule); }
  S.selRuleType=type; render();
}
function toggleRuleEnabled(id,type) {
  const p=curPreset(); if(!p)return;
  const list=type==='cond'?p.condRules:p.itemRules;
  const r=list?.find(x=>x.id===id); if(r){r.enabled=!r.enabled; markDirty(); renderRules(); if(S.selRuleId===id)renderEdit();}
}
function delRule(id,type) {
  const p=curPreset(); if(!p||p.isEditable===false)return;
  if(type==='cond') p.condRules=p.condRules.filter(r=>r.id!==id);
  else p.itemRules=p.itemRules.filter(r=>r.id!==id);
  if(S.selRuleId===id){S.selRuleId=null;S.selRuleType=null;}
  markDirty(); render();
}
function dupRule(id,type) {
  const p=curPreset(); if(!p||p.isEditable===false)return;
  const list=type==='cond'?p.condRules:p.itemRules;
  const src=list?.find(r=>r.id===id); if(!src)return;
  const n=JSON.parse(JSON.stringify(src));
  n.id=uid(); n.name=src.name+'(복사)'; n.priority=Math.max(...list.map(r=>r.priority))+1;
  list.push(n); S.selRuleId=n.id; S.selRuleType=type; markDirty(); render();
}
function moveRule(id, type, dir) {
  const p = curPreset(); if (!p || p.isEditable === false) return;
  const list = (type==='cond' ? p.condRules : p.itemRules).slice().sort((a,b)=>a.priority-b.priority);
  const idx = list.findIndex(r => r.id === id);
  const swapIdx = idx + dir;
  if (swapIdx < 0 || swapIdx >= list.length) return;
  const tmp = list[idx].priority;
  list[idx].priority = list[swapIdx].priority;
  list[swapIdx].priority = tmp;
  // 우선순위 정규화 (1,2,3...)
  list.sort((a,b)=>a.priority-b.priority).forEach((r,i) => r.priority = i+1);
  markDirty(); render();
}
function navRule(dir) {
  const p=curPreset(); if(!p)return;
  const all=[...(p.condRules||[]).map(r=>({...r,_type:'cond'})),...(p.itemRules||[]).map(r=>({...r,_type:'item'}))].sort((a,b)=>a.priority-b.priority);
  const idx=all.findIndex(r=>r.id===S.selRuleId);
  const ni=idx+dir;
  if(ni>=0&&ni<all.length){selectRule(all[ni].id,all[ni]._type);}
}

// ══ CONTEXT MENU ══
function showCtx(id, anchor) {
  const m=document.getElementById('ctxMenu');
  m.innerHTML='';
  [['✏️ 이름 변경',()=>renamePreset(id),false],['📋 복제',()=>dupPreset(id),false],['🗑 삭제',()=>delPreset(id),true]].forEach(([lbl,fn,danger])=>{
    const b=el('button',danger?'danger':'',lbl); b.onclick=()=>{m.style.display='none';fn();}; m.appendChild(b);
  });
  const rect=anchor.getBoundingClientRect();
  m.style.left=rect.left+'px'; m.style.top=(rect.bottom+4)+'px'; m.style.display='block';
  setTimeout(()=>document.addEventListener('click',()=>m.style.display='none',{once:true}),10);
}
function renamePreset(id){const p=S.presets.find(x=>x.id===id);if(!p)return;const n=prompt('새 이름:',p.name);if(n?.trim()){p.name=n.trim();render();}}
function dupPreset(id){
  const src=S.presets.find(x=>x.id===id);if(!src)return;
  const cust=S.presets.filter(p=>!p.isSystem);if(cust.length>=20){toast('최대 20개','warn');return;}
  const n=JSON.parse(JSON.stringify(src));
  n.id=uid();n.name=src.name+'(복사)';n.isSystem=false;n.isEditable=true;
  n.condRules.forEach(r=>r.id=uid());n.itemRules.forEach(r=>r.id=uid());
  S.presets.push(n);selectPreset(n.id);
}
function delPreset(id){
  const p=S.presets.find(x=>x.id===id);if(!p||p.isSystem)return;
  if(!confirm('"'+p.name+'" 삭제?'))return;
  S.presets=S.presets.filter(x=>x.id!==id);
  if(S.curId===id){S.curId=S.presets[0]?.id||null;S.selRuleId=null;}
  if(S.appliedId===id){const sys=S.presets.find(p=>p.isSystem);S.appliedId=sys?.id||S.presets[0]?.id||null;}
  render();
}

// ══ EXPORT / IMPORT ══
function exportFilter(){
  const p=curPreset();if(!p){toast('프리셋 선택','warn');return;}
  if(p.isSystem){toast('시스템 프리셋은 Export 불가','warn');return;}
  const json={version:'1.0',preset_name:p.name,default_behavior:p.defaultBehavior||'Default',
    condRules:(p.condRules||[]).map(r=>({priority:r.priority,is_enabled:r.enabled,operator:r.operator,conditions:r.cond,action:r.action})),
    itemRules:(p.itemRules||[]).map(r=>({priority:r.priority,is_enabled:r.enabled,item_keys:r.itemKeys,action:r.action}))};
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(json,null,2));
  a.download=p.name.replace(/[^\w가-힣]/g,'_')+'.nutfilter'; a.click();
}
function importClick(){document.getElementById('importInput').click();}
function onImport(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      const cust=S.presets.filter(p=>!p.isSystem);
      if(cust.length>=20){toast('최대 20개','warn');return;}
      const p={id:uid(),name:d.preset_name||'Import',isSystem:false,isEditable:true,isFavorite:false,
        defaultBehavior:d.default_behavior||'Default',
        condRules:(d.condRules||[]).map(r=>({id:uid(),type:'cond',name:'조건규칙#'+r.priority,priority:r.priority,enabled:r.is_enabled!==false,operator:r.operator||'AND',cond:r.conditions||mkCond(),action:r.action||mkAction()})),
        itemRules:(d.itemRules||[]).map(r=>({id:uid(),type:'item',name:'아이템규칙#'+r.priority,priority:r.priority,enabled:r.is_enabled!==false,itemKeys:r.item_keys||[],action:r.action||mkAction()}))};
      S.presets.push(p);selectPreset(p.id);toast('Import 완료: '+p.name);
    }catch(err){toast('Import 실패: '+err.message,'warn');}
    e.target.value='';
  };
  r.readAsText(f);
}

// ══ HELPERS ══
function el(tag,cls,text=''){const e=document.createElement(tag);if(cls)e.className=cls;if(text)e.textContent=text;return e;}
function emptyState(ico,txt){const d=el('div','empty',);d.appendChild(el('span','empty-ico',ico));d.appendChild(el('span','empty-txt',txt));return d;}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toggleArr(obj,field,val){if(!obj[field])obj[field]=[];const i=obj[field].indexOf(val);i>=0?obj[field].splice(i,1):obj[field].push(val);}
function toast(msg,type='ok'){const t=el('div','toast',msg);t.style.background=type==='warn'?'var(--warn)':'var(--text)';document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}

// enter key for modals
document.getElementById('addName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmAdd();});
document.getElementById('saveAsName').addEventListener('keydown',e=>{if(e.key==='Enter')confirmSaveAs();});

init();
</script>
